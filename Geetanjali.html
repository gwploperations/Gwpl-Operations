<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GWPL | Order Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --bg:#14171B;
    --panel:#1B1F24;
    --panel-2:#20252B;
    --line:#2C323A;
    --brass:#C68A46;
    --brass-light:#E0AD70;
    --walnut:#8A5A34;
    --text:#EDEAE4;
    --muted:#8D93A0;
    --muted-2:#5E6470;
    --ok:#5FBF83;
    --warn:#E0B450;
    --bad:#E0715F;
    --info:#6FA0D6;

    --role-admin:#C68A46;
    --role-sales:#6FA0D6;
    --role-sizing:#8A6FD6;
    --role-piyush:#5FBF9E;
    --role-khushal:#D68F5F;
    --role-milan:#6FBFD6;
  }
  *{box-sizing:border-box;}
  html,body,#root{height:100%;margin:0;}
  body{
    font-family:"Inter",-apple-system,sans-serif;
    background:var(--bg);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{font-family:"Fraunces","Georgia",serif;}
  .mono{font-family:"JetBrains Mono",monospace;}
  ::selection{background:var(--brass);color:#14171B;}
  button{font-family:inherit;}
  input,select{font-family:inherit;color:var(--text);}

  /* ============ LOGIN ============ */
  .login-stage{
    height:100vh;display:flex;align-items:stretch;overflow:hidden;
    background:
      repeating-linear-gradient(100deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 68px),
      linear-gradient(160deg,#14171B 0%,#191D22 60%,#14171B 100%);
  }
  .login-brand{
    flex:0 0 40%;display:flex;flex-direction:column;justify-content:center;padding:60px;
    border-right:1px solid var(--line);position:relative;
  }
  .brand-eyebrow{color:var(--brass);font-size:11px;letter-spacing:3px;font-weight:600;text-transform:uppercase;margin-bottom:14px;}
  .login-brand h1{font-size:44px;font-weight:600;line-height:1.08;margin:0 0 18px;color:var(--text);}
  .login-brand h1 em{color:var(--brass-light);font-style:normal;}
  .login-brand p{color:var(--muted);font-size:14.5px;line-height:1.6;max-width:340px;margin:0;}
  .login-tags{margin-top:36px;display:flex;gap:10px;flex-wrap:wrap;}
  .login-tag{
    border:1px solid var(--line);color:var(--muted);font-size:11px;padding:5px 10px;border-radius:3px;
    font-family:"JetBrains Mono",monospace;
  }

  .login-panel{flex:1;display:flex;align-items:center;justify-content:center;padding:40px;}
  .login-card{width:100%;max-width:400px;}
  .login-card h2{font-size:15px;color:var(--muted);font-weight:600;margin:0 0 22px;text-transform:uppercase;letter-spacing:1.5px;}
  .login-field{margin-bottom:14px;}
  .login-field label{display:block;font-size:11.5px;color:var(--muted);margin-bottom:6px;}
  .login-select, .login-input{
    width:100%;background:var(--panel);border:1px solid var(--line);border-radius:5px;padding:12px 14px;
    font-size:14px;color:var(--text);
  }
  .login-select:focus, .login-input:focus{outline:none;border-color:var(--brass);}
  .enter-btn{
    width:100%;background:var(--brass);color:#14171B;border:none;border-radius:5px;padding:13px;font-weight:700;
    font-size:14px;cursor:pointer;margin-top:6px;
  }
  .enter-btn:hover{background:var(--brass-light);}
  .enter-btn:disabled{background:var(--muted-2);cursor:not-allowed;}
  .login-err{color:var(--bad);font-size:12.5px;margin-top:10px;}
  .login-hint{color:var(--muted-2);font-size:11.5px;margin-top:14px;line-height:1.6;}

  /* ============ APP SHELL ============ */
  .app{display:flex;flex-direction:column;height:100vh;}
  .topbar{
    display:flex;align-items:center;justify-content:space-between;background:var(--panel);
    border-bottom:1px solid var(--line);padding:12px 22px;flex-shrink:0;
  }
  .topbar-brand{display:flex;align-items:center;gap:10px;}
  .topbar-brand .mark{width:8px;height:22px;background:var(--brass);border-radius:1px;}
  .topbar-brand h1{font-size:16px;margin:0;font-weight:600;letter-spacing:.2px;}
  .topbar-brand .sub{font-size:11px;color:var(--muted);margin-top:1px;}
  .topbar-right{display:flex;align-items:center;gap:12px;}
  .sync-pill{
    display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);
    border:1px solid var(--line);padding:6px 12px;border-radius:20px;
  }
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);}
  .sync-dot.off{background:var(--bad);}
  .role-chip{
    display:flex;align-items:center;gap:8px;background:var(--panel-2);border:1px solid var(--line);
    padding:6px 12px;border-radius:20px;font-size:12.5px;font-weight:600;
  }
  .role-chip .rt-dot{width:8px;height:8px;border-radius:50%;}
  .ghost-btn{
    background:transparent;border:1px solid var(--line);color:var(--muted);padding:7px 13px;
    border-radius:5px;font-size:12.5px;cursor:pointer;
  }
  .ghost-btn:hover{color:var(--text);border-color:var(--muted-2);}

  .toolbar{
    display:flex;align-items:center;justify-content:space-between;padding:14px 22px;
    background:var(--bg);flex-shrink:0;gap:14px;border-bottom:1px solid var(--line);
  }
  .search-in{
    flex:1;max-width:340px;background:var(--panel);border:1px solid var(--line);border-radius:5px;
    padding:9px 14px;font-size:13px;color:var(--text);
  }
  .search-in:focus{outline:none;border-color:var(--brass);}
  .toolbar-actions{display:flex;gap:9px;align-items:center;}
  .count-note{font-size:12px;color:var(--muted-2);}
  .primary-btn{
    background:var(--brass);color:#14171B;border:none;padding:9px 18px;border-radius:5px;
    font-size:13px;font-weight:700;cursor:pointer;
  }
  .primary-btn:hover{background:var(--brass-light);}

  /* ============ ORDER LIST ============ */
  .list-wrap{flex:1;overflow:auto;padding:18px 22px 40px;}
  .empty-state{padding:80px 20px;text-align:center;color:var(--muted);}
  .empty-state h3{color:var(--text);font-weight:600;margin-bottom:8px;}

  .order-card{
    background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:15px 18px;
    margin-bottom:10px;cursor:pointer;transition:.12s;display:grid;
    grid-template-columns:110px 1.4fr 1fr 1fr 210px;gap:18px;align-items:center;
  }
  .order-card:hover{border-color:var(--brass);background:var(--panel-2);}
  .oc-tag{
    font-family:"JetBrains Mono",monospace;font-weight:700;font-size:13px;color:var(--brass-light);
    background:rgba(198,138,70,0.12);border:1px solid rgba(198,138,70,0.35);border-radius:4px;
    padding:5px 9px;display:inline-block;text-align:center;
  }
  .oc-main .oc-project{font-weight:600;font-size:14.5px;color:var(--text);}
  .oc-main .oc-meta{font-size:12px;color:var(--muted);margin-top:2px;}
  .oc-col{font-size:12.5px;color:var(--muted);}
  .oc-col .oc-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted-2);margin-bottom:2px;}
  .oc-col .oc-val{color:var(--text);font-weight:500;}

  .stage-track{display:flex;align-items:center;gap:3px;}
  .stage-dot{width:20px;height:5px;border-radius:3px;background:var(--line);position:relative;}
  .stage-dot.done{background:var(--ok);}
  .stage-dot.current{background:var(--warn);}
  .stage-track-label{font-size:10px;color:var(--muted-2);margin-top:5px;}

  /* ============ MODAL ============ */
  .modal-veil{
    position:fixed;inset:0;background:rgba(10,12,14,0.72);display:flex;align-items:center;justify-content:center;
    z-index:50;padding:26px;backdrop-filter:blur(2px);
  }
  .modal-box{
    background:var(--panel);border:1px solid var(--line);border-radius:9px;width:100%;max-width:760px;
    max-height:88vh;display:flex;flex-direction:column;overflow:hidden;
  }
  .modal-box.narrow{max-width:460px;}
  .modal-head{
    display:flex;align-items:center;justify-content:space-between;padding:18px 22px;
    border-bottom:1px solid var(--line);flex-shrink:0;
  }
  .modal-head h2{font-size:19px;margin:0;font-weight:600;}
  .modal-head .oc-tag{margin-top:6px;}
  .close-x{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;}
  .close-x:hover{color:var(--text);}
  .modal-body{overflow-y:auto;padding:20px 22px;flex:1;}
  .modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0;}

  .field-card{border:1px solid var(--line);border-radius:7px;margin-bottom:14px;overflow:hidden;}
  .field-card-head{
    padding:9px 15px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;
    color:#14171B;display:flex;align-items:center;justify-content:space-between;
  }
  .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);}
  .field-grid.cols-4{grid-template-columns:1fr 1fr 1fr 1fr;}
  .field-cell{background:var(--panel);padding:11px 15px;}
  .field-cell label{display:block;font-size:10.5px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;}
  .field-cell .fc-val{font-size:13.5px;color:var(--text);font-weight:500;min-height:19px;}
  .field-cell input, .field-cell select{
    width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:4px;padding:7px 9px;font-size:13px;
  }
  .field-cell input:disabled, .field-cell select:disabled{background:transparent;border-color:transparent;padding:0;color:var(--text);}
  .field-cell input:focus, .field-cell select:focus{outline:none;border-color:var(--brass);}

  .form-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--brass-light);margin:18px 0 8px;}
  .form-section-title:first-child{margin-top:0;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
  .form-grid.cols-4{grid-template-columns:1fr 1fr 1fr 1fr;}
  .form-field label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;}
  .form-field input,.form-field select{
    width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:5px;padding:9px 11px;font-size:13px;
  }
  .form-field input:focus,.form-field select:focus{outline:none;border-color:var(--brass);}
  .toggle-row{display:flex;gap:8px;}
  .toggle-opt{
    flex:1;text-align:center;padding:9px;border:1px solid var(--line);border-radius:5px;font-size:12.5px;
    font-weight:600;cursor:pointer;color:var(--muted);background:var(--panel-2);
  }
  .toggle-opt.active-yes{background:rgba(95,191,131,0.15);border-color:var(--ok);color:var(--ok);}
  .toggle-opt.active-no{background:rgba(224,113,95,0.12);border-color:var(--bad);color:var(--bad);}

  .sales-manager-list{display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto;margin-bottom:14px;}
  .sales-manager-row{
    display:flex;align-items:center;justify-content:space-between;background:var(--panel-2);
    border:1px solid var(--line);border-radius:5px;padding:9px 13px;font-size:13px;
  }
  .sm-del{background:none;border:none;color:var(--bad);cursor:pointer;font-size:13px;}

  .dup-warning{
    background:rgba(224,180,80,0.1);border:1px solid var(--warn);border-radius:6px;padding:14px 16px;
    font-size:13px;color:var(--text);margin-bottom:16px;line-height:1.6;
  }
  .status-pill{
    display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;text-transform:capitalize;
  }
  .status-pill.ok{background:rgba(95,191,131,0.15);color:var(--ok);}
  .status-pill.warn{background:rgba(224,180,80,0.15);color:var(--warn);}
  .status-pill.bad{background:rgba(224,113,95,0.15);color:var(--bad);}
  .status-pill.neutral{background:var(--line);color:var(--muted);}

  ::-webkit-scrollbar{width:9px;height:9px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:5px;}
  ::-webkit-scrollbar-track{background:transparent;}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ============ CONFIGURATION ============
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7mB0YPlWBRslyzdVtTtGJblAp6HFBtpaMRVl2BXt64tIMW8Jg_E0f2LnEtsjg9fkr2A/exec";
const POLL_MS = 5000;

async function apiGet() {
  const res = await fetch(APPS_SCRIPT_URL, { method: "GET" });
  return res.json();
}
async function apiPost(payload) {
  const res = await fetch(APPS_SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload),
  });
  return res.json();
}

const ROLES = {
  ankit:   { label: "Ankit",        group: "admin",   color: "var(--role-admin)" },
  vidhi:   { label: "Vidhi Shinde", group: "sales",   color: "var(--role-sales)" },
  bajrang: { label: "Bajrang",      group: "sizing",  color: "var(--role-sizing)" },
  madhav:  { label: "Madhav",       group: "sizing",  color: "var(--role-sizing)" },
  piyush:  { label: "Piyush",       group: "piyush",  color: "var(--role-piyush)" },
  khushal: { label: "Khushal",      group: "khushal", color: "var(--role-khushal)" },
  milan:   { label: "Milan",        group: "milan",   color: "var(--role-milan)" },
};

function canEditGroup(role, fieldGroup) {
  return ROLES[role].group === "admin" || ROLES[role].group === fieldGroup;
}

const QTY_FIELDS = [
  { key: "mdf", label: "MDF" }, { key: "md", label: "MD" },
  { key: "bdf", label: "BDF" }, { key: "bd", label: "BD" },
  { key: "btf", label: "BTF" }, { key: "btd", label: "BTD" },
  { key: "frf", label: "FRF" }, { key: "frd", label: "FRD" },
];

function blankOrder() {
  return {
    order_no: "", order_year: new Date().getFullYear(), salesperson: "", developer_name: "",
    project_name: "", location: "", office_coordinator: "", office_coordinator_no: "",
    site_coordinator: "", site_coordinator_no: "", order_type: "Sample", cnc_slotting: "No",
    mdf: "", md: "", bdf: "", bd: "", btf: "", btd: "", frf: "", frd: "",
    other_label: "", other_frame_qty: "", other_door_qty: "",
    door_lock: "", door_lock_brand: "", hinges: "", hinges_brand: "",
  };
}

function stageStatus(order, hw) {
  const stages = [
    { label: "Sales", done: !!order.order_no },
    { label: "Sizing", done: order.sizing_received === "Yes" },
    { label: "Hardware", done: order.cnc_slotting !== "Yes" || (hw && hw.door_lock && hw.hinges) },
    { label: "Laminate", done: order.laminate_ordered === "Yes" && order.edgeband_ordered === "Yes" },
    { label: "Production", done: !!order.production_date },
    { label: "Install", done: !!order.installation_date },
    { label: "QC", done: order.qc_status === "Passed" },
  ];
  return stages;
}

// ---------------- Login ----------------
function Login({ onLogin }) {
  const [role, setRole] = useState("ankit");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [checking, setChecking] = useState(false);

  const submit = async () => {
    if (!password) { setError("Enter your password."); return; }
    setChecking(true);
    setError("");
    const result = await apiPost({ action: "login", role, password });
    setChecking(false);
    if (result && result.ok) {
      localStorage.setItem("gwpl_ort_role", role);
      onLogin(role);
    } else {
      setError("Incorrect password. Try again.");
    }
  };

  return (
    <div className="login-stage">
      <div className="login-brand">
        <div className="brand-eyebrow">Geetanjali Woodcraft Pvt. Ltd.</div>
        <h1>Every order,<br/><em>tracked door to door.</em></h1>
        <p>From first sales entry through sizing, hardware, lamination, production and site installation — one running record, kept in your Google Sheet.</p>
        <div className="login-tags">
          <span className="login-tag">SALES</span>
          <span className="login-tag">SIZING</span>
          <span className="login-tag">HARDWARE</span>
          <span className="login-tag">LAMINATE</span>
          <span className="login-tag">PRODUCTION</span>
          <span className="login-tag">INSTALL</span>
          <span className="login-tag">QC</span>
        </div>
      </div>
      <div className="login-panel">
        <div className="login-card">
          <h2>Sign in to continue</h2>
          <div className="login-field">
            <label>Name</label>
            <select className="login-select" value={role} onChange={e => { setRole(e.target.value); setError(""); }}>
              {Object.entries(ROLES).map(([key, r]) => <option key={key} value={key}>{r.label}</option>)}
            </select>
          </div>
          <div className="login-field">
            <label>Password</label>
            <input
              type="password" className="login-input" placeholder="Password"
              value={password}
              onChange={e => setPassword(e.target.value)}
              onKeyDown={e => e.key === "Enter" && submit()}
            />
          </div>
          <button className="enter-btn" onClick={submit} disabled={checking}>{checking ? "Checking..." : "Enter"}</button>
          {error && <div className="login-err">{error}</div>}
        </div>
      </div>
    </div>
  );
}

// ---------------- Change password modal ----------------
function ChangePasswordModal({ role, onClose }) {
  const [oldPw, setOldPw] = useState("");
  const [newPw, setNewPw] = useState("");
  const [confirmPw, setConfirmPw] = useState("");
  const [msg, setMsg] = useState(null);
  const [saving, setSaving] = useState(false);

  const submit = async () => {
    if (!oldPw || !newPw) { setMsg({ type: "err", text: "Fill in both fields." }); return; }
    if (newPw !== confirmPw) { setMsg({ type: "err", text: "New passwords don't match." }); return; }
    setSaving(true);
    const result = await apiPost({ action: "changePassword", role, oldPassword: oldPw, newPassword: newPw });
    setSaving(false);
    if (result && result.ok) {
      setMsg({ type: "ok", text: "Password updated. Ankit has been notified by email." });
      setOldPw(""); setNewPw(""); setConfirmPw("");
    } else {
      setMsg({ type: "err", text: result.error || "Current password is incorrect." });
    }
  };

  return (
    <div className="modal-veil" onClick={onClose}>
      <div className="modal-box narrow" onClick={e => e.stopPropagation()}>
        <div className="modal-head"><h2>Change Password</h2><button className="close-x" onClick={onClose}>✕</button></div>
        <div className="modal-body">
          <div className="form-field" style={{ marginBottom: 12 }}>
            <label>Current Password</label>
            <input type="password" value={oldPw} onChange={e => setOldPw(e.target.value)} />
          </div>
          <div className="form-field" style={{ marginBottom: 12 }}>
            <label>New Password</label>
            <input type="password" value={newPw} onChange={e => setNewPw(e.target.value)} />
          </div>
          <div className="form-field" style={{ marginBottom: 4 }}>
            <label>Confirm New Password</label>
            <input type="password" value={confirmPw} onChange={e => setConfirmPw(e.target.value)} />
          </div>
          {msg && <div className={msg.type === "ok" ? "login-hint" : "login-err"} style={{ marginTop: 10 }}>{msg.text}</div>}
        </div>
        <div className="modal-foot">
          <button className="ghost-btn" onClick={onClose}>Close</button>
          <button className="primary-btn" onClick={submit} disabled={saving}>{saving ? "Saving..." : "Update Password"}</button>
        </div>
      </div>
    </div>
  );
}

// ---------------- Admin: reset anyone's password ----------------
function ResetPasswordModal({ onClose }) {
  const [targetRole, setTargetRole] = useState("vidhi");
  const [newPw, setNewPw] = useState("");
  const [msg, setMsg] = useState(null);
  const [saving, setSaving] = useState(false);

  const submit = async () => {
    if (!newPw) { setMsg({ type: "err", text: "Enter a new password." }); return; }
    setSaving(true);
    const result = await apiPost({ action: "resetPassword", role: targetRole, newPassword: newPw });
    setSaving(false);
    if (result && result.ok) {
      setMsg({ type: "ok", text: ROLES[targetRole].label + "'s password has been reset. They (and Ankit) were notified by email." });
      setNewPw("");
    } else {
      setMsg({ type: "err", text: "Something went wrong." });
    }
  };

  return (
    <div className="modal-veil" onClick={onClose}>
      <div className="modal-box narrow" onClick={e => e.stopPropagation()}>
        <div className="modal-head"><h2>Reset Someone's Password</h2><button className="close-x" onClick={onClose}>✕</button></div>
        <div className="modal-body">
          <div className="form-field" style={{ marginBottom: 12 }}>
            <label>Team Member</label>
            <select value={targetRole} onChange={e => setTargetRole(e.target.value)}>
              {Object.entries(ROLES).filter(([k]) => k !== "ankit").map(([key, r]) => <option key={key} value={key}>{r.label}</option>)}
            </select>
          </div>
          <div className="form-field">
            <label>New Password</label>
            <input type="text" value={newPw} onChange={e => setNewPw(e.target.value)} placeholder="e.g. Vidhi@2026" />
          </div>
          {msg && <div className={msg.type === "ok" ? "login-hint" : "login-err"} style={{ marginTop: 10 }}>{msg.text}</div>}
        </div>
        <div className="modal-foot">
          <button className="ghost-btn" onClick={onClose}>Close</button>
          <button className="primary-btn" onClick={submit} disabled={saving}>{saving ? "Saving..." : "Reset Password"}</button>
        </div>
      </div>
    </div>
  );
}

// ---------------- Inline editable field ----------------
function EditField({ value, onCommit, editable, type = "text", options = null }) {
  const [val, setVal] = useState(value ?? "");
  useEffect(() => setVal(value ?? ""), [value]);

  if (!editable) {
    return <div className="fc-val">{value || <span style={{ color: "var(--muted-2)" }}>—</span>}</div>;
  }
  if (type === "select") {
    return (
      <select value={val} onChange={e => { setVal(e.target.value); onCommit(e.target.value); }}>
        <option value=""></option>
        {options.map(o => <option key={o} value={o}>{o}</option>)}
      </select>
    );
  }
  return (
    <input
      type={type}
      value={val}
      onChange={e => setVal(e.target.value)}
      onBlur={() => { if (val !== (value ?? "")) onCommit(val); }}
      onKeyDown={e => e.key === "Enter" && e.target.blur()}
    />
  );
}

// ---------------- New order modal ----------------
function NewOrderModal({ salespersons, onClose, onCreated }) {
  const [form, setForm] = useState(blankOrder());
  const [dup, setDup] = useState(null);
  const [saving, setSaving] = useState(false);

  const set = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

  const submit = async (override) => {
    if (!form.order_no || !form.project_name) { alert("Order No. and Project Name are required."); return; }
    setSaving(true);
    const result = await apiPost({ action: "insertOrder", values: form, override: !!override });
    setSaving(false);
    if (result.duplicate) {
      setDup(result);
      return;
    }
    onCreated();
  };

  return (
    <div className="modal-veil" onClick={onClose}>
      <div className="modal-box" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <h2>New Order</h2>
          <button className="close-x" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          {dup && (
            <div className="dup-warning">
              <strong>Order No. "{form.order_no}" is already used this year</strong> — for "{dup.project_name}" ({dup.salesperson}).
              Double-check before continuing. If this is intentional, you can override and save anyway.
            </div>
          )}

          <div className="form-section-title">Order Basics</div>
          <div className="form-grid">
            <div className="form-field"><label>Order No.</label><input value={form.order_no} onChange={e => set("order_no", e.target.value)} /></div>
            <div className="form-field">
              <label>Salesperson</label>
              <input list="sp-list" value={form.salesperson} onChange={e => set("salesperson", e.target.value)} placeholder="Type initials..." />
              <datalist id="sp-list">{salespersons.map(s => <option key={s} value={s} />)}</datalist>
            </div>
            <div className="form-field"><label>Developer Name</label><input value={form.developer_name} onChange={e => set("developer_name", e.target.value)} /></div>
            <div className="form-field"><label>Project Name</label><input value={form.project_name} onChange={e => set("project_name", e.target.value)} /></div>
            <div className="form-field"><label>Location</label><input value={form.location} onChange={e => set("location", e.target.value)} /></div>
            <div className="form-field">
              <label>Sample or Full Order</label>
              <div className="toggle-row">
                <div className={"toggle-opt" + (form.order_type === "Sample" ? " active-yes" : "")} onClick={() => set("order_type", "Sample")}>Sample</div>
                <div className={"toggle-opt" + (form.order_type === "Full Order" ? " active-yes" : "")} onClick={() => set("order_type", "Full Order")}>Full Order</div>
              </div>
            </div>
          </div>

          <div className="form-section-title">Coordinators</div>
          <div className="form-grid">
            <div className="form-field"><label>Office Coordinator</label><input value={form.office_coordinator} onChange={e => set("office_coordinator", e.target.value)} /></div>
            <div className="form-field"><label>Office Coordinator No.</label><input value={form.office_coordinator_no} onChange={e => set("office_coordinator_no", e.target.value)} /></div>
            <div className="form-field"><label>Site Coordinator</label><input value={form.site_coordinator} onChange={e => set("site_coordinator", e.target.value)} /></div>
            <div className="form-field"><label>Site Coordinator No.</label><input value={form.site_coordinator_no} onChange={e => set("site_coordinator_no", e.target.value)} /></div>
          </div>

          <div className="form-section-title">Quantities</div>
          <div className="form-grid cols-4">
            {QTY_FIELDS.map(q => (
              <div className="form-field" key={q.key}><label>{q.label}</label><input type="number" value={form[q.key]} onChange={e => set(q.key, e.target.value)} /></div>
            ))}
            <div className="form-field"><label>Other (label)</label><input value={form.other_label} onChange={e => set("other_label", e.target.value)} /></div>
            <div className="form-field"><label>Other Frame Qty</label><input type="number" value={form.other_frame_qty} onChange={e => set("other_frame_qty", e.target.value)} /></div>

          <div className="form-section-title">CNC Slotting</div>
          <div className="toggle-row" style={{ marginBottom: 12 }}>
            <div className={"toggle-opt" + (form.cnc_slotting === "Yes" ? " active-yes" : "")} onClick={() => set("cnc_slotting", "Yes")}>Yes</div>
            <div className={"toggle-opt" + (form.cnc_slotting === "No" ? " active-no" : "")} onClick={() => set("cnc_slotting", "No")}>No</div>
          </div>

          {form.cnc_slotting === "Yes" && (
            <React.Fragment>
              <div className="form-section-title">Hardware</div>
              <div className="form-grid">
                <div className="form-field">
                  <label>Door Lock</label>
                  <select value={form.door_lock} onChange={e => set("door_lock", e.target.value)}>
                    <option value=""></option><option>Yes</option><option>No</option>

                </div>

                  <select value={form.hinges} onChange={e => set("hinges", e.target.value)}>

          {dup ? (
            <button className="primary-btn" onClick={() => submit(true)} disabled={saving}>Override & Save Anyway</button>
          ) : (
            <button className="primary-btn" onClick={() => submit(false)} disabled={saving}>{saving ? "Saving..." : "Save Order"}</button>
          )}
        </div>
      </div>
    </div>
  );
}

// ---------------- Salesperson manager ----------------
function SalespersonManager({ salespersons, onClose, onChanged }) {
  const [name, setName] = useState("");

  const add = async () => {
    if (!name.trim()) return;
    await apiPost({ action: "addSalesperson", name: name.trim() });
    setName("");
    onChanged();
  };
  const remove = async (n) => {
    if (!window.confirm("Remove " + n + " from the salesperson list?")) return;
    await apiPost({ action: "deleteSalesperson", name: n });
    onChanged();
  };

  return (
    <div className="modal-veil" onClick={onClose}>
      <div className="modal-box narrow" onClick={e => e.stopPropagation()}>
        <div className="modal-head"><h2>Salespersons</h2><button className="close-x" onClick={onClose}>✕</button></div>
        <div className="modal-body">
          <div className="sales-manager-list">
            {salespersons.map(n => (
              <div className="sales-manager-row" key={n}>
                {n}
                <button className="sm-del" onClick={() => remove(n)}>Remove</button>
              </div>
            ))}
          </div>
          <div className="form-grid" style={{ gridTemplateColumns: "1fr auto" }}>
            <input placeholder="New salesperson name" value={name} onChange={e => setName(e.target.value)} onKeyDown={e => e.key === "Enter" && add()} />
            <button className="primary-btn" onClick={add}>Add</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ---------------- Order card row ----------------
function OrderCard({ order, hardware, onOpen }) {
  const stages = stageStatus(order, hardware);
  return (
    <div className="order-card" onClick={onOpen}>
      <div><span className="oc-tag mono">{order.order_no}</span></div>
      <div className="oc-main">
        <div className="oc-project">{order.project_name || "Untitled"}</div>
        <div className="oc-meta">{order.developer_name} · {order.location}</div>
      </div>
      <div className="oc-col"><div className="oc-label">Salesperson</div><div className="oc-val">{order.salesperson || "—"}</div></div>
      <div className="oc-col"><div className="oc-label">Type</div><div className="oc-val">{order.order_type || "—"}</div></div>
      <div>
        <div className="stage-track">

        <div className="stage-track-label">{stages.filter(s => s.done).length}/{stages.length} stages</div>

// ---------------- Main App ----------------
function App() {
  const [role, setRole] = useState(() => localStorage.getItem("gwpl_ort_role"));
  const [orders, setOrders] = useState([]);
  const [hardwareMap, setHardwareMap] = useState({});
  const [salespersons, setSalespersons] = useState([]);
  const [search, setSearch] = useState("");
  const [connected, setConnected] = useState(false);
  const [loading, setLoading] = useState(true);
  const [openOrder, setOpenOrder] = useState(null);
  const [showNew, setShowNew] = useState(false);
  const [showSalesMgr, setShowSalesMgr] = useState(false);
  const [showChangePw, setShowChangePw] = useState(false);
  const [showResetPw, setShowResetPw] = useState(false);
  const editingRef = useRef(false);
  const pollRef = useRef(null);

  const fetchAll = useCallback(async () => {
    try {
      const data = await apiGet();
      if (!editingRef.current) {
        setOrders(data.orders || []);
        const hw = {};
        (data.hardware || []).forEach(h => (hw[h.order_no] = h));
        setHardwareMap(hw);
        setSalespersons(data.salespersons || []);
      }
      setConnected(true);
    } catch (err) {
      setConnected(false);
    }
    setLoading(false);
  }, []);

  useEffect(() => {
    if (!role) return;
    fetchAll();
    pollRef.current = setInterval(fetchAll, POLL_MS);
    return () => clearInterval(pollRef.current);
  }, [role, fetchAll]);

  useEffect(() => {
    if (openOrder) {
      const fresh = orders.find(o => o.row === openOrder.row);
      if (fresh) setOpenOrder(fresh);
    }
  }, [orders]);

  const updateOrderField = async (order, key, value) => {
    setOrders(prev => prev.map(o => (o.row === order.row ? { ...o, [key]: value } : o)));
    await apiPost({ action: "updateOrderField", row: order.row, key, value });
  };
  const updateHardwareField = async (order, key, value) => {
    setHardwareMap(prev => ({ ...prev, [order.order_no]: { ...(prev[order.order_no] || {}), [key]: value } }));
    await apiPost({ action: "updateHardwareField", order_no: order.order_no, key, value });
  };

  if (!role) return <Login onLogin={setRole} />;

  const filtered = orders.filter(o => {
    if (!search.trim()) return true;
    const s = search.toLowerCase();
    return ["order_no", "project_name", "salesperson", "location", "developer_name"].some(k => (o[k] || "").toString().toLowerCase().includes(s));
  });

  const canCreate = ROLES[role].group === "sales" || ROLES[role].group === "admin";

  return (
    <div
      className="app"
      onFocusCapture={() => (editingRef.current = true)}
      onBlurCapture={() => (editingRef.current = false)}
    >
      <div className="topbar">
        <div className="topbar-brand">
          <div className="mark"></div>
          <div>
            <h1>GWPL Order Tracker</h1>
            <div className="sub">Geetanjali Woodcraft · Digital Operations</div>
          </div>
        </div>
        <div className="topbar-right">
          <div className="sync-pill"><span className={"sync-dot" + (connected ? "" : " off")}></span>{connected ? "Synced to Google Sheet" : "Reconnecting..."}</div>
          <div className="role-chip"><span className="rt-dot" style={{ background: ROLES[role].color }}></span>{ROLES[role].label}</div>
          <button className="ghost-btn" onClick={() => setShowChangePw(true)}>Change Password</button>
          {ROLES[role].group === "admin" && <button className="ghost-btn" onClick={() => setShowResetPw(true)}>Reset Someone's Password</button>}
          <button className="ghost-btn" onClick={() => { localStorage.removeItem("gwpl_ort_role"); setRole(null); }}>Switch</button>
        </div>
      </div>

      <div className="toolbar">
        <input className="search-in" placeholder="Search order no., project, salesperson, location..." value={search} onChange={e => setSearch(e.target.value)} />
        <div className="toolbar-actions">
          <span className="count-note">{filtered.length} order{filtered.length === 1 ? "" : "s"}</span>
          {canCreate && <button className="ghost-btn" onClick={() => setShowSalesMgr(true)}>Salespersons</button>}
          {canCreate && <button className="primary-btn" onClick={() => setShowNew(true)}>+ New Order</button>}
        </div>
      </div>

      <div className="list-wrap">
        {loading ? (
          <div className="empty-state">Loading orders…</div>
        ) : filtered.length === 0 ? (
          <div className="empty-state">
            <h3>No orders yet</h3>
            <p>{canCreate ? "Start by adding the first order." : "Once Sales adds an order, it'll show up here."}</p>
          </div>
        ) : (
          filtered.map(o => (
            <OrderCard key={o.row} order={o} hardware={hardwareMap[o.order_no] || {}} onOpen={() => setOpenOrder(o)} />
          ))
        )}
      </div>

      {openOrder && (
        <OrderDetail
          order={openOrder}
          hardware={hardwareMap[openOrder.order_no] || {}}
          role={role}
          onClose={() => setOpenOrder(null)}
          onUpdateOrder={(k, v) => updateOrderField(openOrder, k, v)}
          onUpdateHardware={(k, v) => updateHardwareField(openOrder, k, v)}
        />
      )}
      {showNew && (
        <NewOrderModal
          salespersons={salespersons}
          onClose={() => setShowNew(false)}
          onCreated={() => { setShowNew(false); fetchAll(); }}
        />
      )}
      {showSalesMgr && (
        <SalespersonManager
          salespersons={salespersons}
          onClose={() => setShowSalesMgr(false)}
          onChanged={fetchAll}
        />
      )}
      {showChangePw && <ChangePasswordModal role={role} onClose={() => setShowChangePw(false)} />}
      {showResetPw && <ResetPasswordModal onClose={() => setShowResetPw(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
