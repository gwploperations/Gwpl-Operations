<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GWPL Control Tower — Dispatch & Logistics</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --ink:#0B1020; --ink-2:#1F2433; --aqua:#4F46E5; --aqua-d:#4338CA; --cyan:#7C3AED;
  --indigo:#4F46E5; --indigo-d:#4338CA; --violet:#7C3AED;
  --mint:#FBFBFE; --mint-2:#F1F2FB; --card:#FFFFFF; --line:#E8EAF3;
  --coral:#E5484D; --coral-bg:#FCECEC; --amber:#C98A17; --amber-bg:#FBF3E1;
  --green:#129E6E; --green-bg:#E7F6EF; --slate:#5B6478; --slate-2:#8A93A6;
  --violet-bg:#F1EBFA; --grid:rgba(79,70,229,.05);
  --shadow:0 1px 2px rgba(16,24,40,.04),0 12px 30px rgba(16,24,40,.06);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:"Times New Roman",Times,Georgia,serif;background:
  linear-gradient(to right, var(--grid) 1px, transparent 1px) 0 0/52px 52px,
  linear-gradient(to bottom, var(--grid) 1px, transparent 1px) 0 0/52px 52px,var(--mint);
  color:var(--ink);-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:"Times New Roman",Times,Georgia,serif;margin:0;letter-spacing:-.01em}
.mono{font-family:"Times New Roman",Times,Georgia,serif}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:var(--aqua-d)}
svg{width:1em;height:1em;flex-shrink:0}

.app{display:flex;min-height:100vh}
.side{width:236px;flex-shrink:0;background:#fff;border-right:1px solid var(--line);color:var(--ink-2);padding:22px 14px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:4px}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 20px}
.logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--indigo),var(--violet));display:grid;place-items:center;box-shadow:0 6px 16px rgba(79,70,229,.28)}
.logo svg{width:22px;height:22px}
.brand b{font-family:"Times New Roman",Times,Georgia,serif;color:var(--ink);font-size:16px;display:block;line-height:1.1;font-weight:800}
.brand span{font-size:10.5px;color:var(--slate-2);letter-spacing:.12em;text-transform:uppercase}
.nav{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;color:var(--slate);font-size:13.5px;font-weight:500;transition:.15s;width:100%;text-align:left}
.nav:hover{background:var(--mint-2);color:var(--indigo)}
.nav.on{background:var(--violet-bg);color:var(--indigo);box-shadow:inset 0 0 0 1px rgba(79,70,229,.18);font-weight:600}
.nav svg{width:17px;height:17px;flex-shrink:0}
.nav .badge{margin-left:auto;background:var(--coral);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:grid;place-items:center;padding:0 5px}
.side-foot{margin-top:auto;font-size:11px;color:var(--slate-2);padding:10px 8px 0;line-height:1.5}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:6px}

.main{flex:1;min-width:0;padding:26px 30px 60px;max-width:1480px}
.top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.top h1{font-size:28px;font-weight:800;letter-spacing:-.02em;color:var(--ink)}
.top p{margin:5px 0 0;color:var(--slate);font-size:13.5px}
.top .actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:999px;font-size:13.5px;font-weight:600;transition:.15s;white-space:nowrap}
.btn svg{width:15px;height:15px}
.btn-p{background:var(--indigo);color:#fff;box-shadow:0 4px 12px rgba(79,70,229,.22)}
.btn-p:hover{background:var(--indigo-d);transform:translateY(-1px)}
.btn-g{background:#fff;color:var(--ink);box-shadow:inset 0 0 0 1px var(--line)}
.btn-g:hover{box-shadow:inset 0 0 0 1px var(--indigo);color:var(--indigo)}
.btn-sm{padding:6px 11px;font-size:12.5px}
.btn-d{background:var(--coral-bg);color:var(--coral)}
.btn-d:hover{background:#ffdede}
.btn:disabled{opacity:.5;cursor:not-allowed}

.card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);border:1px solid var(--line)}
.grid{display:grid;gap:16px}
.stat{padding:18px 20px;position:relative;overflow:hidden}
.stat .k{font-size:11.5px;color:var(--slate);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.stat .v{font-family:"Times New Roman",Times,Georgia,serif;font-size:30px;font-weight:800;letter-spacing:-.02em;margin-top:6px;line-height:1}
.stat .s{font-size:12px;color:var(--slate-2);margin-top:7px}
.stat .ic{position:absolute;right:16px;top:16px;width:34px;height:34px;border-radius:10px;display:grid;place-items:center}
.stat .ic svg{width:18px;height:18px}

.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600}
.chip svg{width:12px;height:12px}
.c-hub{background:var(--amber-bg);color:#B7791F}
.c-delivered{background:var(--green-bg);color:#0B8A66}
.c-porter{background:#E6F1FB;color:#2b6cb0}
.c-loaded{background:var(--mint-2);color:var(--aqua-d)}
.c-sample{background:var(--violet-bg);color:var(--violet)}
.c-full{background:#E6F1FB;color:#2b6cb0}
.c-paid{background:var(--green-bg);color:#0B8A66}
.c-unpaid{background:var(--coral-bg);color:#D64545}
.c-pri{background:var(--ink);color:#fff}
.c-attn{background:var(--coral);color:#fff}

table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:11px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--slate);font-weight:600;border-bottom:1px solid var(--line);white-space:nowrap;background:#F4FBF9}
td{padding:10px 12px;border-bottom:1px solid #EDF6F4;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--mint)}
.t-wrap{overflow-x:auto;border-radius:16px}

.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-2);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--ink);transition:.15s;min-width:0}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--aqua);box-shadow:0 0 0 3px rgba(79,70,229,.14)}
.field .hint{font-size:11px;color:var(--slate-2);margin-top:5px}
.f-row{display:grid;gap:14px;grid-template-columns:1fr 1fr}
.f-row-3{display:grid;gap:12px;grid-template-columns:1fr 1fr 1fr}
.f-row-4{display:grid;gap:10px;grid-template-columns:1fr 1fr 1fr 1fr}
.f-row>*,.f-row-3>*,.f-row-4>*{min-width:0}

.overlay{position:fixed;inset:0;background:rgba(11,61,58,.42);backdrop-filter:blur(3px);z-index:50;display:flex;align-items:flex-start;justify-content:center;padding:34px 16px;overflow-y:auto}
.modal{background:var(--mint);border-radius:20px;width:100%;max-width:720px;box-shadow:0 30px 80px rgba(11,61,58,.3);animation:pop .2s ease}
.modal.wide{max-width:900px}
@keyframes pop{from{transform:translateY(14px);opacity:0}to{transform:none;opacity:1}}
.modal-head{padding:18px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}
.modal-head h3{font-size:18px;font-weight:600}
.modal-body{padding:20px 24px;max-height:74vh;overflow-y:auto;overflow-x:hidden}
.modal-foot{padding:14px 24px;display:flex;justify-content:flex-end;gap:10px;border-top:1px solid var(--line);flex-wrap:wrap}
.x{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;color:var(--slate)}
.x:hover{background:var(--mint-2)}

.section-t{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--slate);font-weight:700;margin:20px 0 12px;display:flex;align-items:center;gap:8px}
.section-t:before{content:'';width:14px;height:2px;background:var(--aqua);border-radius:2px}

.alert{display:flex;gap:10px;padding:12px 15px;border-radius:12px;font-size:13px;align-items:flex-start;margin-bottom:14px}
.alert svg{width:17px;height:17px;flex-shrink:0;margin-top:1px}
.alert-warn{background:var(--coral-bg);color:#C23B3B}
.alert-ok{background:var(--green-bg);color:#0B8A66}
.alert-info{background:#E6F1FB;color:#2b6cb0}

.empty{text-align:center;padding:44px 20px;color:var(--slate-2)}
.empty svg{width:44px;height:44px;margin-bottom:12px;opacity:.5}
.empty h4{font-size:15px;color:var(--slate);margin-bottom:5px}

.tabbar{display:flex;gap:4px;background:#fff;padding:5px;border-radius:12px;box-shadow:var(--shadow);margin-bottom:20px;flex-wrap:wrap;border:1px solid rgba(207,233,228,.7)}
.tab{padding:8px 15px;border-radius:8px;font-size:13px;font-weight:600;color:var(--slate)}
.tab.on{background:var(--mint);color:var(--ink)}
.tab:hover:not(.on){color:var(--ink)}

.pill-toggle{display:inline-flex;background:var(--mint-2);border-radius:10px;padding:3px}
.pill-toggle button{padding:7px 14px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--slate)}
.pill-toggle button.on{background:#fff;color:var(--ink);box-shadow:var(--shadow)}

.mini-x{width:28px;height:28px;border-radius:8px;color:var(--coral);display:grid;place-items:center;flex-shrink:0}
.mini-x:hover{background:var(--coral-bg)}

.kv{display:flex;justify-content:space-between;padding:7px 0;font-size:13px;border-bottom:1px dashed #E0EFEC}
.kv:last-child{border-bottom:none}
.kv .lbl{color:var(--slate)}
.kv .val{font-weight:600;font-family:"Times New Roman",Times,Georgia,serif}

.search{position:relative}
.search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--slate-2)}
.search input{padding:9px 12px 9px 36px;border-radius:10px;border:1px solid var(--line);background:#fff}

.attach-box{border:1.5px dashed var(--line);border-radius:12px;padding:16px;text-align:center;cursor:pointer;background:#fff;transition:.15s}
.attach-box:hover{border-color:var(--aqua);background:var(--mint)}
.attach-box svg{width:22px;height:22px;color:var(--aqua);margin-bottom:6px}
.attach-item{display:flex;align-items:center;gap:8px;padding:8px 11px;background:#fff;border-radius:9px;border:1px solid var(--line);font-size:12.5px;margin-top:8px}
.attach-item .grow{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:12px;font-size:13.5px;font-weight:500;z-index:100;box-shadow:0 12px 30px rgba(0,0,0,.25);display:flex;align-items:center;gap:9px;animation:pop .2s}
.toast svg{width:16px;height:16px;color:var(--cyan)}

.seg{height:12px;border-radius:8px;overflow:hidden;display:flex;background:var(--mint-2)}
.seg span{height:100%}
.seg-legend{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap;font-size:12px;color:var(--slate)}
.seg-legend b{color:var(--ink)}
.leg-dot{width:9px;height:9px;border-radius:3px;display:inline-block;margin-right:6px;vertical-align:middle}
.client-pick{padding:9px 12px;border-radius:10px;border:1px solid var(--line);background:#fff;min-width:230px;font-weight:600}

.cons{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
.cons-head{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap}
.cons-title{font-family:"Times New Roman",Times,Georgia,serif;font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px}

/* dispatch item rows — compact, no overflow */
.disp-head,.disp-row{display:grid;grid-template-columns:1.6fr .9fr 1fr .9fr 1fr;gap:10px;align-items:center}
.disp-head{font-size:10.5px;color:var(--slate);font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:0 2px 6px}
.disp-row{padding:8px;background:var(--mint);border-radius:9px;margin-bottom:6px}
.disp-row .mat{font-weight:600;font-size:13px}
.disp-row .bal{font-family:"Times New Roman",Times,Georgia,serif;font-size:13px}
.disp-row input{padding:7px 9px;font-size:13px;border-radius:8px;border:1px solid var(--line);width:100%;min-width:0}
.disp-row .tw{font-family:"Times New Roman",Times,Georgia,serif;font-size:12.5px;color:var(--slate)}

/* order item editor rows */
.oi-head,.oi-row{display:grid;grid-template-columns:2fr 1fr 1.1fr 1fr auto;gap:8px;align-items:center}
.oi-head{font-size:10.5px;color:var(--slate);font-weight:600;text-transform:uppercase;padding:0 2px 4px}
.oi-row{margin-bottom:6px}
.oi-row input{padding:7px 9px;font-size:12.5px;border-radius:8px;border:1px solid var(--line);width:100%;min-width:0}

@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,107,107,.45)}70%{box-shadow:0 0 0 12px rgba(255,107,107,0)}100%{box-shadow:0 0 0 0 rgba(255,107,107,0)}}
.attn{animation:pulse 1.7s infinite}

@media (max-width:900px){
  .side{position:fixed;left:-260px;z-index:60;transition:.25s}
  .side.open{left:0}
  .main{padding:18px}
  .f-row,.f-row-3,.f-row-4{grid-template-columns:1fr 1fr}
  .disp-head{display:none}
  .disp-row{grid-template-columns:1fr 1fr}
  .oi-row,.oi-head{grid-template-columns:1fr 1fr}
  .menu-btn{display:grid !important}
}
.menu-btn{display:none;width:38px;height:38px;border-radius:10px;background:#fff;box-shadow:var(--shadow);place-items:center;color:var(--ink)}

@media print{
  .side,.top .actions,.menu-btn,.tabbar,.no-print{display:none !important}
  body{background:#fff}.main{padding:0;max-width:100%}
  .card{box-shadow:none;border:1px solid #ccc}
  .print-only{display:block !important}
  table{font-size:10px}th,td{padding:5px 6px}
}
.print-only{display:none}
.rep{border:1px solid #E4E6F2;font-size:12px;border-radius:10px;overflow:hidden}
.rep th,.rep td{border-right:1px solid #EDEEF7;border-bottom:1px solid #EDEEF7;text-align:center;vertical-align:middle;padding:9px 10px;line-height:1.35}
.rep th:last-child,.rep td:last-child{border-right:none}
.rep tr:last-child td{border-bottom:none}
.rep td.l{text-align:left}
.rep td.manual{color:var(--slate);font-style:italic}
.rep th{background:#F5F6FD;color:var(--ink-2);font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.rep tfoot td{background:#F5F6FD;border-bottom:none}
@media print{@page{size:A4 landscape;margin:9mm}.rep{font-size:10.5px}.rep th,.rep td{padding:6px 7px}}
</style>
</head>
