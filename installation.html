<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Geetanjali Wood Craft — Installation Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1c1917;color:#e7e5e4;font-family:system-ui,sans-serif;min-height:100vh}
.wrap{max-width:900px;margin:0 auto;padding:16px 16px 80px}
header{display:flex;align-items:center;gap:12px;padding:16px 0;border-bottom:1px solid #44403c;margin-bottom:20px}
.logo{width:40px;height:40px;border-radius:10px;background:#f59e0b;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.nav-btn{padding:8px 12px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;background:#292524;color:#a8a29e;transition:.15s}
.nav-btn:hover{background:#3f3a36}
.nav-btn.active{background:#f59e0b;color:#1c1917}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600}
.btn-amber{background:#f59e0b;color:#1c1917}.btn-amber:hover{background:#fbbf24}
.btn-ghost{background:#292524;color:#a8a29e}.btn-ghost:hover{background:#3f3a36}
.btn-sm{padding:6px 10px;font-size:12px}
.btn-danger{background:#450a0a;color:#f87171}.btn-danger:hover{background:#7f1d1d}
.card{background:#292524;border:1px solid #44403c;border-radius:12px;padding:16px;margin-bottom:12px}
.card-hover{cursor:pointer}.card-hover:hover{border-color:#a16207}
input,select,textarea{background:#1c1917;border:1px solid #44403c;border-radius:8px;padding:8px 10px;color:#e7e5e4;font-size:14px;outline:none;width:100%}
input:focus,select:focus{border-color:#f59e0b}
input:disabled{opacity:0.5}
label>span{font-size:12px;color:#a8a29e;display:block;margin-bottom:4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
@media(max-width:600px){.grid2,.grid3,.grid4{grid-template-columns:1fr 1fr}}
.progress{height:8px;background:#44403c;border-radius:4px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;border-radius:4px;transition:.3s}
.empty{text-align:center;padding:48px 16px;color:#78716c;border:1px dashed #44403c;border-radius:12px}
.tag{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600}
.floor-card{background:#292524;border:1px solid #44403c;border-radius:12px;overflow:hidden;margin-bottom:12px}
.floor-head{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#1c1917;border-bottom:1px solid #44403c}
.door-row{padding:12px 16px;border-bottom:1px solid #44403c}
.door-row:last-child{border-bottom:none}
.stepper{display:inline-flex;align-items:center;gap:4px}
.stepper button{width:26px;height:26px;border-radius:6px;background:#44403c;border:none;color:#e7e5e4;cursor:pointer;font-size:16px;line-height:1}
.stepper button:hover{background:#57534e}
.stepper input{width:46px;text-align:center;padding:2px 4px;font-size:13px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:#292524;border:1px solid #44403c;border-radius:16px;width:100%;max-width:480px;padding:20px;max-height:90vh;overflow-y:auto}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.lock-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-radius:10px;border:1px solid #44403c;background:#292524;margin-bottom:16px}
.stat-box{background:#292524;border:1px solid #44403c;border-radius:10px;padding:12px;text-align:center}
.stat-val{font-size:22px;font-weight:700;margin:4px 0}
.stat-lbl{font-size:11px;color:#a8a29e}
.activity-row{display:flex;align-items:center;gap:10px;padding:10px;background:#292524;border:1px solid #44403c;border-radius:10px;margin-bottom:8px}
.avatar{width:32px;height:32px;border-radius:50%;background:#451a03;color:#f59e0b;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.followup-row{background:#292524;border:1px solid #44403c;border-left:4px solid #f97316;border-radius:10px;padding:12px;margin-bottom:8px}
.hw-row{background:#292524;border:1px solid #44403c;border-left:4px solid #44403c;border-radius:10px;padding:12px;margin-bottom:8px}
.cert-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;overflow:auto;padding:16px}
.cert-paper{background:#fff;color:#1c1917;max-width:750px;margin:0 auto;border-radius:8px;padding:32px;font-family:Georgia,serif}
.cert-actions{display:flex;justify-content:flex-end;gap:8px;max-width:750px;margin:0 auto 12px}
.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background:#1c1917}
.auth-box{background:#292524;border:1px solid #44403c;border-radius:16px;padding:24px;width:100%;max-width:360px}
.hold-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;background:#431407;border:1px solid #7c2d12;border-radius:8px;padding:10px;margin-top:8px}
.fault-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;background:#450a0a;border:1px solid #7f1d1d;border-radius:8px;padding:10px;margin-top:8px}
@media(max-width:600px){.hold-grid{grid-template-columns:1fr}.fault-grid{grid-template-columns:1fr}}
@media print{.wrap{display:none!important}.cert-bg{position:static!important;background:#fff!important;padding:0!important}.cert-actions{display:none!important}.cert-paper{box-shadow:none!important}}
</style>
</head>
<body>
<div id="app"><div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:#f59e0b">Loading…</div></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

// ── config ──
const URL_ = 'https://hjcangcnosrgmnssxslq.supabase.co';
const KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhqY2FuZ2Nub3NyZ21uc3N4c2xxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNjM4NjEsImV4cCI6MjA5NjgzOTg2MX0.up93hDiyIrrfPzQIKAszq3Iioh-0olreU0ZyhNLy-z4';
const sb   = createClient(URL_, KEY);

// ── constants ──
const STD_DOORS = [
  {label:'Main Door',frame:true},
  {label:'Bedroom Door',frame:true},
  {label:'Bathroom Door',frame:true},
  {label:'Fire Door',frame:true},
  {label:'Refuge Door',frame:true}
];
const HOLD_REASONS = ['Gypsum incomplete','Tiling incomplete','Frame not ready','Material not given','Other'];
const FAULT_REASONS= ['Damaged in transit','Wrong size','Manufacturing defect','Poor finish / polish','Broken on site','Warped / bent','Other'];
const HW_ITEMS = ['Hinges','Mortise Lock','Door Handle Set','Door Closer','Tower Bolt','Aldrop','Door Stopper','Magnetic Catcher','Peephole','Latch','Screws','Door Knob','Floor Spring','Concealed Hinge'];
const HW_STATUS= ['Pending','Sent','Received'];
const CONTACTS= [{key:'sitePerson',label:'Geetanjali Site Person'},{key:'site',label:'Site Incharge'},{key:'head',label:'Project Head'},{key:'store',label:'Store Keeper'},{key:'qc',label:'QC Incharge'}];
const DEFAULT_DEDUCTION = 1000;

// ── helpers ──
const uid = () => Math.random().toString(36).slice(2,10);
const num = v => isNaN(parseInt(v)) ? 0 : parseInt(v);
const clamp = (v,min,max) => Math.min(Math.max(v,min), max!=null?max:9999);
const today = () => new Date().toISOString().slice(0,10);
const fmtDate = s => s ? s.split('-').reverse().join('/') : '';
const todayStr = () => new Date().toLocaleDateString('en-GB');
const fmtMoney = n => '₹'+(Number(n)||0).toLocaleString('en-IN');
const daysBetween = (from,to) => {
  if(!from||!to) return 0;
  return Math.round((new Date(to+'T00:00:00') - new Date(from+'T00:00:00'))/86400000);
};
const rel = ts => {
  if(!ts) return '';
  const s = Math.floor((Date.now()-ts)/1000);
  if(s<60) return 'just now';
  const m = Math.floor(s/60); if(m<60) return m+'m ago';
  const h = Math.floor(m/60); if(h<24) return h+'h ago';
  return Math.floor(h/24)+'d ago';
};
const emptyContacts = () => CONTACTS.reduce((a,r)=>({...a,[r.key]:{name:'',phone:''}}),{});
const normContacts  = (c={}) => CONTACTS.reduce((a,r)=>({...a,[r.key]:{name:c?.[r.key]?.name||'',phone:c?.[r.key]?.phone||''}}),{});
const emptyDoor = (label,frame,custom=false) => ({id:uid(),label,frame,custom,total:0,readyQty:0,holdQty:0,holdReason:'',promisedDate:'',notes:'',dispatchedQty:0,dispatchDate:'',arrivedQty:0,arrivalDate:'',noFrameNeeded:false,framesInstalled:0,doorsInstalled:0,handoverQty:0,faultyQty:0,faultyReason:'',faultyNotes:''});
const emptyFloor = name => ({id:uid(),name,handoverDate:'',acceptedBy:'',doors:STD_DOORS.map(d=>emptyDoor(d.label,d.frame))});
const normDoor = d => ({...emptyDoor('Door',true),...d});

// ── commitment / penalty ──
// Promised date = completion date committed by the fitter / installation team.
// Deduction runs at <rate>/day from promised date → today (while open),
// and freezes the moment an Actual completion date is filled in.
function computeCommitment(project){
  const promised = project.promisedDate||'';
  const rate = num(project.deductionRate!=null?project.deductionRate:DEFAULT_DEDUCTION);
  const done = project.actualCompletionDate||'';
  if(!promised) return {status:'none',promised:'',done:'',rate,overdueDays:0,remaining:0,deduction:0};
  const endRef = done || today();
  const overdueDays = Math.max(daysBetween(promised,endRef),0);
  const remaining = done ? 0 : Math.max(daysBetween(today(),promised),0);
  const deduction = overdueDays*rate;
  let status;
  if(done) status = daysBetween(promised,done)>0 ? 'late-done' : 'ontime-done';
  else if(overdueDays>0) status='overdue';
  else if(remaining<=3) status='due-soon';
  else status='upcoming';
  return {status,promised,done,rate,overdueDays,remaining,deduction};
}

// ── state ──
let session=null, loading=true, syncing=false;
let projects=[], activity=[], adminPin=null, clientPin=null;
let adminUnlocked=false, clientUnlocked=false;
let tab='projects', activeId=null, certId=null;
let modal=null; // 'addProject'|'adminPin'|'clientPin'
let installSel=null, dailySel=null, hwSel=null, handoverSel=null;
let lastSeen = parseInt(localStorage.getItem('gwc-seen')||'0')||0;
let rtChannel=null;
const saveTimers={};

const userName = () => session?.user?.user_metadata?.name || session?.user?.email || 'Team';

// ── supabase kv ──
async function kvGet(key){
  const {data,error} = await sb.from('kv').select('value').eq('key',key).maybeSingle();
  if(error){console.error('kvGet',error);return null;}
  return data ? data.value : null;
}
async function kvSet(key,value){
  const {error} = await sb.from('kv').upsert({key,value,updated_at:new Date().toISOString()},{onConflict:'key'});
  if(error) console.error('kvSet',error);
}
function scheduleSave(key,value){
  clearTimeout(saveTimers[key]);
  saveTimers[key]=setTimeout(()=>kvSet(key,value),800);
}

// ── realtime ──
function setupRealtime(){
  if(rtChannel) return;
  rtChannel = sb.channel('kv-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'kv'},row=>{
      if(!row.new) return;
      const {key,value} = row.new;
      if(key==='projects'){projects=normalizeProjects(value||[]);render();}
      else if(key==='activity'){activity=value||[];render();}
      else if(key==='admin_pin'){adminPin=value||null;}
      else if(key==='client_pin'){clientPin=value||null;}
    })
    .subscribe();
}

// ── data ──
function normalizeProjects(arr){
  return (arr||[]).map(p=>({
    ...p,
    floors:(p.floors||[]).map(f=>({
      ...f,
      doors:(f.doors||f.cells) ? normalizeDoors(f) : STD_DOORS.map(d=>emptyDoor(d.label,d.frame))
    })),
    dailyLog:p.dailyLog||[],
    hardwareLog:p.hardwareLog||[],
    orderNo:p.orderNo||'',
    promisedDate:p.promisedDate||'',
    deductionRate:p.deductionRate!=null?p.deductionRate:DEFAULT_DEDUCTION,
    actualCompletionDate:p.actualCompletionDate||'',
    contacts:normContacts(p.contacts)
  }));
}
function normalizeDoors(f){
  if(f.doors) return f.doors.map(normDoor);
  const doors=[];
  STD_DOORS.forEach(d=>{const c=(f.cells||{})[d.key]||{};doors.push({...emptyDoor(d.label,d.frame),...c,id:uid()})});
  return doors;
}

async function loadData(){
  loading=true; render();
  const [pj,ac,ap,cp] = await Promise.all([kvGet('projects'),kvGet('activity'),kvGet('admin_pin'),kvGet('client_pin')]);
  projects = normalizeProjects(pj||[]);
  activity = ac||[];
  adminPin = ap||null;
  clientPin= cp||null;
  loading=false;
  setupRealtime();
  render();
}

async function refresh(){
  syncing=true; render();
  const [pj,ac] = await Promise.all([kvGet('projects'),kvGet('activity')]);
  projects=normalizeProjects(pj||[]);
  activity=ac||[];
  syncing=false; render();
}

function saveProjects(){ scheduleSave('projects',projects); }
function saveActivity(){ scheduleSave('activity',activity); }

function pushActivity(projectName,section){
  const who=userName(), now=Date.now();
  const top=activity[0];
  if(top && top.who===who && top.project===projectName && top.section===section && now-top.ts<90000){
    activity[0]={...top,ts:now};
  } else {
    activity=[{id:uid(),who,ts:now,project:projectName,section},...activity].slice(0,200);
  }
  saveActivity();
}

function updateProject(id,fn){
  projects=projects.map(p=>{
    if(p.id!==id) return p;
    const updated=fn(p);
    return {...updated, lastUpdate:{who:userName(),ts:Date.now()}};
  });
  const p=projects.find(x=>x.id===id);
  pushActivity(p?.name||'a project', currentSection());
  saveProjects();
  render();
}

function currentSection(){
  return {projects:'Project',install:'Installation',daily:'Daily Log',hardware:'Hardware',handover:'Handover'}[tab]||'Project';
}

// ── auth ──
async function init(){
  const {data} = await sb.auth.getSession();
  session = data.session;
  sb.auth.onAuthStateChange((_,s)=>{
    const wasNull = !session;
    session=s;
    if(s && wasNull) loadData();
    else if(!s){ loading=false; render(); }
  });
  if(session) await loadData();
  else { loading=false; render(); }
}

// ── DOM helpers ──
const el=(tag,cls,html)=>{const e=document.createElement(tag);if(cls)e.className=cls;if(html!==undefined)e.innerHTML=html;return e;};
const div=(cls,html)=>el('div',cls,html);
const btn=(cls,txt,onclick)=>{const b=el('button',cls);b.textContent=txt;b.onclick=onclick;return b;};

// ── render ──
const app=document.getElementById('app');
function render(){
  app.innerHTML='';
  if(!session){ app.appendChild(renderAuth()); return; }
  if(loading){ app.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:#f59e0b">Loading your data…</div>'; return; }
  app.appendChild(renderMain());
}

// ── auth screen ──
function renderAuth(){
  const wrap=div('auth-wrap');
  const box=div('auth-box');
  let mode='signin', busy=false;

  const rebuild=()=>{
    box.innerHTML=`
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
        <div class="logo">🔨</div>
        <div>
          <div style="font-size:17px;font-weight:700;color:#f59e0b">Geetanjali Wood Craft</div>
          <div style="font-size:11px;color:#a8a29e">Installation Tracker — team login</div>
        </div>
      </div>
    `;
    if(mode==='signup'){
      const ni=el('input'); ni.placeholder='Your name'; ni.style.marginBottom='10px'; box.appendChild(ni);
      box._nameEl=ni;
    }
    const ei=el('input'); ei.type='email'; ei.placeholder='Email'; ei.style.marginBottom='10px'; box.appendChild(ei);
    const pi=el('input'); pi.type='password'; pi.placeholder='Password (min 6 chars)'; pi.style.marginBottom='10px'; box.appendChild(pi);
    pi.onkeydown=e=>{if(e.key==='Enter') go();};
    box._emailEl=ei; box._passEl=pi;
    const errEl=div(''); errEl.style.cssText='color:#f87171;font-size:12px;margin-bottom:8px;min-height:16px'; box.appendChild(errEl);
    box._errEl=errEl;
    const gb=el('button','btn btn-amber'); gb.style.cssText='width:100%;justify-content:center;margin-bottom:10px';
    gb.textContent=busy?'Please wait…':mode==='signup'?'Create Account':'Sign In';
    gb.disabled=busy; gb.onclick=go; box.appendChild(gb);
    const tb=el('button'); tb.style.cssText='width:100%;background:none;border:none;color:#78716c;font-size:12px;cursor:pointer';
    tb.textContent=mode==='signup'?'Already have an account? Sign in':'New here? Create an account';
    tb.onclick=()=>{mode=mode==='signup'?'signin':'signup'; rebuild();};
    box.appendChild(tb);
  };

  const go=async()=>{
    const email=box._emailEl.value.trim();
    const pass=box._passEl.value;
    const name=box._nameEl?.value.trim()||'';
    if(!email||!pass){box._errEl.textContent='Please enter email and password.';return;}
    if(pass.length<6){box._errEl.textContent='Password must be at least 6 characters.';return;}
    busy=true; rebuild();
    if(mode==='signup'){
      const {error}=await sb.auth.signUp({email,password:pass,options:{data:{name:name||email.split('@')[0]}}});
      if(error){busy=false;rebuild();box._errEl.textContent=error.message;}
      else{busy=false;rebuild();box._errEl.style.color='#34d399';box._errEl.textContent='Account created! Please sign in.';}
    } else {
      const {error}=await sb.auth.signInWithPassword({email,password:pass});
      if(error){busy=false;rebuild();box._errEl.textContent=error.message;}
    }
  };

  rebuild();
  wrap.appendChild(box);
  return wrap;
}

// ── main layout ──
function renderMain(){
  const wrap=div('wrap');

  // header
  const hdr=el('header');
  hdr.innerHTML=`<div class="logo">🔨</div><div><div style="font-size:17px;font-weight:700;color:#f59e0b">Geetanjali Wood Craft</div><div style="font-size:11px;color:#a8a29e">Readiness · Installation · Handover</div></div>`;
  const hr=div('header-right');
  const rb=el('button','btn btn-ghost btn-sm'); rb.innerHTML='↻'; rb.title='Refresh';
  if(syncing) rb.style.animation='spin 1s linear infinite';
  rb.onclick=refresh; hr.appendChild(rb);
  const eb=el('button','btn btn-ghost btn-sm'); eb.textContent='📥 Export'; eb.title='Export data';
  eb.onclick=()=>exportToExcel(activeId||installSel||hwSel||dailySel||handoverSel||dispatchSel||null);
  hr.appendChild(eb);
  const un=div(''); un.style.cssText='padding:6px 10px;background:#292524;border-radius:8px;font-size:12px;color:#a8a29e';
  un.textContent='👤 '+userName(); hr.appendChild(un);
  const lo=btn('btn btn-ghost btn-sm','Sign out',()=>sb.auth.signOut());
  hr.appendChild(lo); hdr.appendChild(hr); wrap.appendChild(hdr);

  // nav
  const newCount=activity.filter(a=>a.ts>lastSeen).length;
  const followups=getFollowups();
  const tabs=[
    {k:'projects',l:'🏗 Projects'},
    {k:'dispatch',l:'🚚 Dispatch'},
    {k:'install',l:'🔧 Installation'},
    {k:'daily',l:'📅 Daily Log'},
    {k:'hardware',l:'📦 Hardware'},
    {k:'handover',l:'✅ Handover'},
    {k:'activity',l:`👥 Activity${newCount?' ('+newCount+')':''}`},
    {k:'dashboard',l:'📊 Dashboard'},
    {k:'followups',l:`📋 Follow-ups${followups.length?' ('+followups.length+')':''}`},
  ];
  const nav=div('');nav.style.cssText='display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px';
  tabs.forEach(t=>{
    const b=el('button','nav-btn'+(tab===t.k?' active':''));
    b.textContent=t.l;
    b.onclick=()=>{
      tab=t.k;
      if(t.k!=='projects') activeId=null;
      if(t.k==='activity'){lastSeen=Date.now();localStorage.setItem('gwc-seen',String(lastSeen));}
      render();
    };
    nav.appendChild(b);
  });
  wrap.appendChild(nav);

  // content
  const content=div('');
  if(tab==='projects'){
    if(!activeId) content.appendChild(renderProjectList());
    else { const p=projects.find(x=>x.id===activeId); if(p) content.appendChild(renderProjectDetail(p)); }
  }
  else if(tab==='install')   content.appendChild(renderInstall());
  else if(tab==='dispatch')  content.appendChild(renderDispatch());
  else if(tab==='daily')     content.appendChild(renderDaily());
  else if(tab==='hardware')  content.appendChild(renderHardware());
  else if(tab==='handover')  content.appendChild(renderHandover());
  else if(tab==='activity')  content.appendChild(renderActivity());
  else if(tab==='dashboard') content.appendChild(renderDashboard());
  else if(tab==='followups') content.appendChild(renderFollowups());
  wrap.appendChild(content);

  // modals
  if(modal==='addProject') wrap.appendChild(renderAddProjectModal());
  else if(modal==='adminPin')  wrap.appendChild(renderPinModal(false));
  else if(modal==='clientPin') wrap.appendChild(renderPinModal(true));

  // certificate
  if(certId){const p=projects.find(x=>x.id===certId);if(p) wrap.appendChild(renderCert(p));}

  return wrap;
}

// ── stepper ──
function makeStepper(val,onChange,color,max,disabled){
  const wrap=div('stepper');
  if(disabled){
    const s=div('');s.style.cssText=`min-width:46px;text-align:center;color:${color||'#e7e5e4'};font-size:13px;opacity:.7`;
    s.textContent=val; wrap.appendChild(s); return wrap;
  }
  const clampV=v=>clamp(v,0,max);
  const minus=el('button');minus.textContent='−';minus.onclick=()=>onChange(clampV(val-1));
  const inp=el('input');inp.type='number';inp.value=val;inp.style.color=color||'#e7e5e4';
  inp.onchange=e=>onChange(clampV(num(e.target.value)));
  const plus=el('button');plus.textContent='+';plus.onclick=()=>onChange(clampV(val+1));
  wrap.append(minus,inp,plus);
  return wrap;
}

    else if(cm.status==='ontime-done') commitTag=`<span class="tag" style="background:#022c22;color:#6ee7b7">✅ On time</span>`;

// ── commitment / penalty card ──
function renderCommitmentCard(project){
  const c=computeCommitment(project);
  const palette={
    overdue:['#450a0a','#7f1d1d','#fca5a5'],
    'due-soon':['#451a03','#92400e','#fbbf24'],
    upcoming:['#1c1917','#44403c','#a8a29e'],
    'late-done':['#450a0a','#7f1d1d','#fca5a5'],
    'ontime-done':['#022c22','#065f46','#6ee7b7'],
    none:['#1c1917','#44403c','#78716c']
  };
  const pal=palette[c.status]||palette.none;
  const card=div('card');
  card.style.cssText=`border:1px solid ${pal[1]};margin-bottom:12px`;
  card.innerHTML=`<div style="font-weight:600;font-size:13px;color:#f59e0b;margin-bottom:4px">🎯 Completion Commitment & Penalty</div>
  <div style="font-size:11px;color:#78716c;margin-bottom:10px">Promised date = date committed by the fitter. Deduction runs until you fill the Actual completion date.</div>`;

  // Save quietly without a full re-render so the date field isn't destroyed mid-edit.
  // The status strip refreshes next time the screen renders (tab switch / back).
  const saveQuiet=(field,val)=>{
    projects=projects.map(p=>p.id===project.id?{...p,[field]:val,lastUpdate:{who:userName(),ts:Date.now()}}:p);
    project[field]=val;
    pushActivity(project.name,'Commitment');
    saveProjects();
  };

  const grid=div('grid3');grid.style.gap='8px';
  const pl=el('label');pl.innerHTML='<span>Promised date (fitter)</span>';
  const pi=el('input');pi.type='date';pi.value=project.promisedDate||'';
  pi.onchange=e=>saveQuiet('promisedDate',e.target.value);
  pl.appendChild(pi);grid.appendChild(pl);

  const rl=el('label');rl.innerHTML='<span>Deduction ₹/day late</span>';
  const ri=el('input');ri.type='number';ri.value=project.deductionRate!=null?project.deductionRate:DEFAULT_DEDUCTION;ri.placeholder=String(DEFAULT_DEDUCTION);
  ri.onblur=e=>saveQuiet('deductionRate',num(e.target.value));
  rl.appendChild(ri);grid.appendChild(rl);

  const cl=el('label');cl.innerHTML='<span>Actual completion</span>';
  const ci=el('input');ci.type='date';ci.value=project.actualCompletionDate||'';
  ci.onchange=e=>saveQuiet('actualCompletionDate',e.target.value);
  cl.appendChild(ci);grid.appendChild(cl);

  // Manual refresh so the status strip + deduction recalculate on demand
  const refreshBar=div('');refreshBar.style.cssText='margin-top:10px;text-align:right';
  refreshBar.appendChild(btn('btn btn-ghost btn-sm','↻ Update status',()=>render()));
  card.appendChild(grid);
  card.appendChild(refreshBar);

  const strip=div('');strip.style.cssText=`margin-top:10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding:10px 12px;border-radius:8px;background:${pal[0]};border:1px solid ${pal[1]}`;
  let msg='';
  if(c.status==='none') msg='Set a promised date to start tracking this site.';
  else if(c.status==='upcoming') msg=`🕒 ${c.remaining} day${c.remaining===1?'':'s'} left until promised date (${fmtDate(c.promised)}).`;
  else if(c.status==='due-soon') msg=`⏳ Due soon — ${c.remaining} day${c.remaining===1?'':'s'} left (${fmtDate(c.promised)}).`;
  else if(c.status==='overdue') msg=`⚠ Overdue by ${c.overdueDays} day${c.overdueDays===1?'':'s'} — penalty still running.`;
  else if(c.status==='late-done') msg=`Completed ${fmtDate(c.done)} — ${c.overdueDays} day${c.overdueDays===1?'':'s'} late.`;
  else if(c.status==='ontime-done') msg=`✅ Completed ${fmtDate(c.done)} on time. No deduction.`;
  const left=div('');left.style.cssText=`font-size:12px;color:${pal[2]};flex:1;min-width:160px`;left.innerHTML=msg;
  const right=div('');right.style.cssText='text-align:right';
  if(c.deduction>0){
    right.innerHTML=`<div style="font-size:11px;color:#a8a29e">Deduction</div><div style="font-size:22px;font-weight:700;color:#f87171">${fmtMoney(c.deduction)}</div><div style="font-size:10px;color:#78716c">${c.overdueDays} days × ${fmtMoney(c.rate)}</div>`;
  } else if(c.promised){
    right.innerHTML=`<div style="font-size:11px;color:#a8a29e">Deduction</div><div style="font-size:22px;font-weight:700;color:#10b981">₹0</div>`;
  }
  strip.append(left,right);card.appendChild(strip);
  return card;
}

function renderDoorRow(projectId,floorId,door){
  const pending=Math.max(door.total-door.readyQty-door.holdQty,0);
  const row=div('door-row');
  const top=div('');top.style.cssText='display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px';

  // label
  const nameDiv=div('');nameDiv.style.cssText='width:140px;display:flex;align-items:center;gap:4px';
  if(door.custom){
    const ni=el('input');ni.value=door.label;ni.disabled=!adminUnlocked;ni.style.cssText='width:110px;font-size:13px;font-weight:500';
    ni.onchange=e=>updateProject(projectId,p=>({...p,floors:p.floors.map(f=>f.id===floorId?{...f,doors:f.doors.map(d=>d.id===door.id?{...normDoor(d),label:e.target.value}:d)}:f)}));
    nameDiv.appendChild(ni);
    if(adminUnlocked){
      const db=el('button');db.textContent='✕';db.style.cssText='background:none;border:none;color:#78716c;cursor:pointer;font-size:12px';
      db.onclick=()=>updateProject(projectId,p=>({...p,floors:p.floors.map(f=>f.id===floorId?{...f,doors:f.doors.filter(d=>d.id!==door.id)}:f)}));
      nameDiv.appendChild(db);
    }
  } else {
    nameDiv.innerHTML=`<span style="font-size:13px;font-weight:500">${door.label}</span>`;
  }
  top.appendChild(nameDiv);

  const cols=div('');cols.style.cssText='display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:12px';
  const mkCol=(lbl,color,stepper)=>{
    const c=div('');c.style.textAlign='center';
    const l=div('');l.style.cssText=`color:${color||'#78716c'};font-size:11px;margin-bottom:3px`;l.textContent=lbl;
    c.append(l,stepper);return c;
  };
  const setField=(field,val)=>updateProject(projectId,p=>({...p,floors:p.floors.map(f=>f.id===floorId?{...f,doors:f.doors.map(d=>d.id===door.id?{...normDoor(d),[field]:val}:d)}:f)}));
  const setTotal=v=>{
    const ready=Math.min(door.readyQty,v);
    const hold=Math.min(door.holdQty,v-ready);
    updateProject(projectId,p=>({...p,floors:p.floors.map(f=>f.id===floorId?{...f,doors:f.doors.map(d=>d.id===door.id?{...normDoor(d),total:v,readyQty:ready,holdQty:Math.max(hold,0)}:d)}:f)}));
  };
  cols.appendChild(mkCol('Total','#78716c',makeStepper(door.total,setTotal,null,null,!adminUnlocked)));
  cols.appendChild(mkCol('Ready','#10b981',makeStepper(door.readyQty,v=>setField('readyQty',v),'#10b981',door.total-door.holdQty)));
  cols.appendChild(mkCol('On Hold','#f97316',makeStepper(door.holdQty,v=>setField('holdQty',v),'#f97316',door.total-door.readyQty)));
  const pendCol=div('');pendCol.style.textAlign='center';
  pendCol.innerHTML=`<div style="color:#78716c;font-size:11px;margin-bottom:3px">Pending</div><div style="color:#f59e0b;font-weight:700;padding:3px 8px">${pending}</div>`;
  cols.appendChild(pendCol);
  top.appendChild(cols);row.appendChild(top);

  if(door.holdQty>0){
    const hp=div('hold-grid');
    const sr=el('select');sr.innerHTML='<option value="">Hold reason…</option>'+HOLD_REASONS.map(r=>`<option value="${r}"${r===door.holdReason?' selected':''}>${r}</option>`).join('');
    sr.onchange=e=>setField('holdReason',e.target.value);
    const dr=el('input');dr.type='date';dr.value=door.promisedDate||'';dr.onchange=e=>setField('promisedDate',e.target.value);
    const nr=el('input');nr.placeholder='Notes…';nr.value=door.notes||'';
    nr.onblur=e=>setField('notes',e.target.value);
    nr.onkeydown=e=>{if(e.key==='Enter')setField('notes',e.target.value);};
    hp.append(sr,dr,nr);row.appendChild(hp);
  }
  return row;
}

// ── PIN modal ──
function renderPinModal(isClient){
  const isNew=isClient?!clientPin:!adminPin;
  const name=isClient?'Client':'Admin';
  const bg=div('modal-bg');bg.onclick=()=>{modal=null;render();};
  const box=div('modal');box.onclick=e=>e.stopPropagation();box.style.maxWidth='360px';
  box.innerHTML=`<div class="modal-head"><h3 style="color:#f59e0b;font-weight:600">🔑 ${isNew?'Set':'Enter'} ${name} PIN</h3><button onclick="closeModal()" style="background:none;border:none;color:#78716c;cursor:pointer;font-size:20px">✕</button></div>
  <p style="font-size:12px;color:#a8a29e;margin-bottom:14px">${isNew?`Set a ${name} PIN to protect this section.`:`Enter the ${name} PIN to unlock.`}</p>`;
  const pi=el('input');pi.type='password';pi.placeholder='Enter PIN (min 4 characters)';pi.style.cssText='text-align:center;letter-spacing:6px;margin-bottom:8px';
  const errEl=div('');errEl.style.cssText='color:#f87171;font-size:12px;margin-bottom:8px;min-height:16px';
  const go=()=>{
    const v=pi.value.trim();
    if(v.length<4){errEl.textContent='Use at least 4 characters.';return;}
    if(isClient){
      if(!clientPin){clientPin=v;kvSet('client_pin',v);clientUnlocked=true;modal=null;render();}
      else if(v===clientPin){clientUnlocked=true;modal=null;render();}
      else{errEl.textContent='Wrong PIN. Try again.';pi.value='';}
    } else {
      if(!adminPin){adminPin=v;kvSet('admin_pin',v);adminUnlocked=true;modal=null;render();}
      else if(v===adminPin){adminUnlocked=true;modal=null;render();}
      else{errEl.textContent='Wrong PIN. Try again.';pi.value='';}
    }
  };
  pi.onkeydown=e=>{if(e.key==='Enter') go();};
  const sb2=btn('btn btn-amber',isNew?'Set PIN & Unlock':'Unlock',go);
  sb2.style.cssText='width:100%;justify-content:center';
  box.append(pi,errEl,sb2);
  setTimeout(()=>pi.focus(),50);
  bg.appendChild(box);return bg;
}

let dispatchSel=null;

    const grid=div('grid2');
    projects.forEach(p=>{
      let rd=0,dis=0,arr=0;
      p.floors.forEach(f=>f.doors.forEach(raw=>{const c=normDoor(raw);rd+=c.readyQty;dis+=Math.min(c.dispatchedQty,c.readyQty);arr+=Math.min(c.arrivedQty,c.readyQty);}));

      const disQ=Math.min(d.dispatchedQty,produced),arrQ=Math.min(d.arrivedQty,produced);
      const setF=(field,val)=>updateProject(project.id,p=>({...p,floors:p.floors.map(fl=>fl.id===f.id?{...fl,doors:fl.doors.map(dd=>dd.id===d.id?{...normDoor(dd),[field]:val}:dd)}:fl)}));

      const dc=div('');dc.style.textAlign='center';dc.innerHTML=`<div style="color:#78716c;font-size:11px;margin-bottom:3px">Dispatched ${disQ}/${produced}</div>`;dc.appendChild(makeStepper(disQ,v=>setF('dispatchedQty',v),'#38bdf8',produced));cols.appendChild(dc);
      const ac=div('');ac.style.textAlign='center';ac.innerHTML=`<div style="color:#78716c;font-size:11px;margin-bottom:3px">Arrived ${arrQ}/${produced}</div>`;ac.appendChild(makeStepper(arrQ,v=>setF('arrivedQty',v),'#10b981',produced));cols.appendChild(ac);

      row.appendChild(dateRow);

  });

}

function exportToExcel(projectId) {
  const toExport = projectId ? projects.filter(p=>p.id===projectId) : projects;
  const rows = [];
  rows.push(['Project','Floor','Door Type','Total','Ready','On Hold','Hold Reason','Promised Date','Frames Installed','Doors Installed','Faulty','Faulty Reason','Dispatched','Dispatch Date','Arrived','Arrival Date','Handed Over','Notes','Site Promised Date','Actual Completion','Deduction/Day','Days Late','Deduction Amount']);
  toExport.forEach(p => {
    const cm=computeCommitment(p);
    p.floors.forEach(f => {
      (f.doors||[]).forEach(raw => {
        const c=normDoor(raw);
        rows.push([p.name,f.name,c.label,c.total,c.readyQty,c.holdQty,c.holdReason||'',fmtDate(c.promisedDate),c.framesInstalled,c.doorsInstalled,c.faultyQty||0,c.faultyReason||'',c.dispatchedQty||0,fmtDate(c.dispatchDate),c.arrivedQty||0,fmtDate(c.arrivalDate),c.handoverQty||0,c.notes||'',fmtDate(p.promisedDate),fmtDate(p.actualCompletionDate),cm.rate,cm.overdueDays,cm.deduction]);
      });
    });
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=projectId?`${toExport[0].name}-data.csv`:'GWPL-All-Projects.csv';
  a.style.display='none';
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
}

// ── dashboard ──
let dashFilter='all';
function renderDashboard(){
  const wrap=div('');
  if(!projects.length){wrap.appendChild(div('empty','Add a project to see the dashboard.'));return wrap;}

  // filter dropdown
  const fd=div('');fd.style.cssText='display:flex;align-items:center;gap:10px;margin-bottom:16px';
  fd.innerHTML='<span style="font-size:13px;color:#a8a29e;font-weight:500">Showing:</span>';
  const sel=el('select');sel.style.cssText='flex:1;max-width:300px;font-weight:600';
  const allOpt=el('option');allOpt.value='all';allOpt.textContent='All Projects';sel.appendChild(allOpt);
  projects.forEach(p=>{
    const o=el('option');o.value=p.id;o.textContent=p.name;
    if(dashFilter===p.id)o.selected=true;
    sel.appendChild(o);
  });
  if(dashFilter==='all')sel.value='all';
  sel.onchange=e=>{dashFilter=e.target.value;render();};
  fd.appendChild(sel);wrap.appendChild(fd);

  const filtered=dashFilter==='all'?projects:projects.filter(p=>p.id===dashFilter);

  // ── commitments / penalties section ──
  const commits=filtered.map(p=>({p,c:computeCommitment(p)})).filter(x=>x.c.promised);
  if(commits.length){
    const order={overdue:0,'due-soon':1,'late-done':2,upcoming:3,'ontime-done':4};
    commits.sort((a,b)=>(order[a.c.status]-order[b.c.status]) || (b.c.deduction-a.c.deduction) || ((a.c.promised||'').localeCompare(b.c.promised||'')));
    const totalDed=commits.reduce((s,x)=>s+x.c.deduction,0);
    const overdueCount=commits.filter(x=>x.c.status==='overdue').length;
    const sec=div('');
    sec.innerHTML=`<h3 style="font-size:13px;font-weight:600;margin-bottom:8px">🎯 Site Completion Commitments${overdueCount?` <span style="color:#fca5a5">· ${overdueCount} overdue</span>`:''}</h3>`;
    const tbl=div('');tbl.style.cssText='background:#292524;border:1px solid #44403c;border-radius:12px;overflow:hidden;margin-bottom:12px';
    commits.forEach(({p,c})=>{
      let label;
      if(c.status==='overdue') label=`<span style="color:#fca5a5">⚠ ${c.overdueDays}d late</span>`;
      else if(c.status==='due-soon') label=`<span style="color:#fbbf24">⏳ ${c.remaining}d left</span>`;
      else if(c.status==='upcoming') label=`<span style="color:#a8a29e">${c.remaining}d left</span>`;
      else if(c.status==='late-done') label=`<span style="color:#fca5a5">Done ${c.overdueDays}d late</span>`;
      else label=`<span style="color:#6ee7b7">✅ On time</span>`;
      const row=div('');row.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid #44403c;gap:8px;cursor:pointer';
      row.onclick=()=>{tab='projects';activeId=p.id;render();};
      row.innerHTML=`<div style="min-width:0;flex:1"><div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</div><div style="font-size:11px;color:#78716c">🎯 ${fmtDate(c.promised)}${c.done?' · ✅ '+fmtDate(c.done):''}${c.rate?' · '+fmtMoney(c.rate)+'/day':''}</div></div>
      <div style="display:flex;align-items:center;gap:14px;font-size:12px;white-space:nowrap">${label}<span style="font-weight:700;color:${c.deduction>0?'#f87171':'#10b981'}">${fmtMoney(c.deduction)}</span></div>`;
      tbl.appendChild(row);
    });
    sec.appendChild(tbl);
    if(totalDed>0){
      const tot=div('');tot.style.cssText='display:flex;justify-content:space-between;align-items:center;background:#450a0a;border:1px solid #7f1d1d;border-radius:10px;padding:12px 16px;margin-bottom:16px';
      tot.innerHTML=`<span style="font-size:13px;color:#fca5a5;font-weight:600">Total deduction (installation team)</span><span style="font-size:20px;font-weight:700;color:#f87171">${fmtMoney(totalDed)}</span>`;
      sec.appendChild(tot);
    }
    wrap.appendChild(sec);
  }

  let T=0,R=0,H=0,P=0,FT=0,FI=0,DT=0,DI=0,HD=0,FA=0;
  const per={},reasons={};
  filtered.forEach(p=>p.floors.forEach(f=>f.doors.forEach(raw=>{
    const c=normDoor(raw);const pend=Math.max(c.total-c.readyQty-c.holdQty,0);
    T+=c.total;R+=c.readyQty;H+=c.holdQty;P+=pend;FA+=c.faultyQty||0;
    if(c.holdQty>0&&c.holdReason) reasons[c.holdReason]=(reasons[c.holdReason]||0)+c.holdQty;
    DT+=c.readyQty;DI+=Math.min(c.doorsInstalled,c.readyQty);HD+=Math.min(c.handoverQty,Math.min(c.doorsInstalled,c.readyQty));
    if(c.frame&&!c.noFrameNeeded){FT+=c.readyQty;FI+=Math.min(c.framesInstalled,c.readyQty);}
    if(!per[c.label])per[c.label]={label:c.label,total:0,ready:0,hold:0,pending:0};
    per[c.label].total+=c.total;per[c.label].ready+=c.readyQty;per[c.label].hold+=c.holdQty;per[c.label].pending+=pend;
  })));
  const framePct=FT?Math.round(FI/FT*100):0,doorPct=DT?Math.round(DI/DT*100):0,handPct=DT?Math.round(HD/DT*100):0;
  const sg=div('grid4');sg.style.marginBottom='16px';
  [{l:'Total Ordered',v:T,c:'#e7e5e4'},{l:'Ready',v:R,c:'#10b981'},{l:'On Hold',v:H,c:'#f97316'},{l:'Pending',v:P,c:'#f59e0b'}].forEach(s=>{
    const sb2=div('stat-box');sb2.innerHTML=`<div class="stat-val" style="color:${s.c}">${s.v}</div><div class="stat-lbl">${s.l}</div>`;sg.appendChild(sb2);
  });
  wrap.appendChild(sg);
  const prod=div('card');prod.style.cssText='background:#022c2220;border:1px solid #065f46;margin-bottom:16px';
  prod.innerHTML=`<div style="font-weight:600;color:#10b981;margin-bottom:4px">✅ Cleared for production right now</div><div style="font-size:28px;font-weight:700;color:#6ee7b7">${R} <span style="font-size:14px;color:#a8a29e">doors</span></div>`;
  wrap.appendChild(prod);
  const pg=div('grid3');pg.style.marginBottom='16px';
  [{l:'Frames fixed',v:FI+'/'+FT,pct:framePct,c:'#38bdf8'},{l:'Doors fixed',v:DI+'/'+DT,pct:doorPct,c:'#10b981'},{l:'Handed over',v:HD+'/'+DT,pct:handPct,c:'#8b5cf6'}].forEach(s=>{
    const sb2=div('stat-box');sb2.innerHTML=`<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:${s.c}">${s.l}</span><span>${s.v}</span></div><div class="progress"><div class="progress-fill" style="width:${s.pct}%;background:${s.c}"></div></div><div style="font-size:11px;color:#78716c;margin-top:4px">${s.pct}%</div>`;
    pg.appendChild(sb2);
  });
  wrap.appendChild(pg);
  if(FA>0) wrap.appendChild(Object.assign(div(''),{innerHTML:`<div style="background:#450a0a;border:1px solid #7f1d1d;border-radius:10px;padding:12px;margin-bottom:12px;font-size:13px;color:#fca5a5">⚠ ${FA} faulty materials — see Installation tab.</div>`}));
  wrap.appendChild(Object.assign(div(''),{innerHTML:'<h3 style="font-size:13px;font-weight:600;margin-bottom:8px">By Door Type</h3>'}));
  const tbl=div('');tbl.style.cssText='background:#292524;border:1px solid #44403c;border-radius:12px;overflow:hidden;margin-bottom:16px';
  Object.values(per).filter(s=>s.total>0).sort((a,b)=>b.total-a.total).forEach(s=>{
    const row=div('');row.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid #44403c';
    row.innerHTML=`<span style="font-size:13px">${s.label}</span><div style="display:flex;gap:12px;font-size:12px"><span style="color:#a8a29e">Tot <b style="color:#e7e5e4">${s.total}</b></span><span style="color:#10b981">Rdy ${s.ready}</span><span style="color:#f97316">Hold ${s.hold}</span><span style="color:#f59e0b">Pend ${s.pending}</span></div>`;
    tbl.appendChild(row);
  });
  wrap.appendChild(tbl);
  if(Object.keys(reasons).length){
    wrap.appendChild(Object.assign(div(''),{innerHTML:'<h3 style="font-size:13px;font-weight:600;margin-bottom:8px">Why doors are on hold</h3>'}));
    const rg=div('grid2');
    Object.entries(reasons).sort((a,b)=>b[1]-a[1]).forEach(([r,n])=>{
      const row=div('');row.style.cssText='background:#292524;border:1px solid #44403c;border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;font-size:13px';
      row.innerHTML=`<span>${r}</span><span style="color:#f97316;font-weight:600">${n} doors</span>`;rg.appendChild(row);
    });
    wrap.appendChild(rg);
  }
  return wrap;
}

// ── followups ──
let followFilter='all';
function getFollowups(){
  const filtered=followFilter==='all'?projects:projects.filter(p=>p.id===followFilter);
  const rows=[];
  filtered.forEach(p=>p.floors.forEach(f=>f.doors.forEach(raw=>{
    const c=normDoor(raw);if(c.holdQty>0) rows.push({id:p.id+f.id+c.id,project:p.name,builder:p.builder,floor:f.name,type:c.label,qty:c.holdQty,reason:c.holdReason||'—',date:c.promisedDate,notes:c.notes});
  })));
  return rows.sort((a,b)=>(a.date||'9999').localeCompare(b.date||'9999'));
}
function renderFollowups(){
  const wrap=div('');

  // filter dropdown
  const fd=div('');fd.style.cssText='display:flex;align-items:center;gap:10px;margin-bottom:16px';
  fd.innerHTML='<span style="font-size:13px;color:#a8a29e;font-weight:500">Showing:</span>';
  const sel=el('select');sel.style.cssText='flex:1;max-width:300px;font-weight:600';
  const allOpt=el('option');allOpt.value='all';allOpt.textContent='All Projects';sel.appendChild(allOpt);
  projects.forEach(p=>{const o=el('option');o.value=p.id;o.textContent=p.name;if(followFilter===p.id)o.selected=true;sel.appendChild(o);});
  if(followFilter==='all')allOpt.selected=true;
  sel.onchange=e=>{followFilter=e.target.value;render();};
  fd.appendChild(sel);wrap.appendChild(fd);

  const rows=getFollowups();
  if(!rows.length){wrap.appendChild(div('empty','No doors on hold. Everything is clear! ✅'));return wrap;}
  wrap.appendChild(Object.assign(div(''),{innerHTML:'<p style="font-size:13px;color:#a8a29e;margin-bottom:12px">All held doors — chase the builder to finish this work, then mark them Ready.</p>'}));
  rows.forEach(r=>{
    const row=div('followup-row');
    row.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div><p style="font-size:13px;font-weight:600">${r.type} <span style="color:#f97316">×${r.qty}</span></p><p style="font-size:12px;color:#a8a29e">${r.project} · ${r.floor}</p></div>
      <span class="tag" style="background:#431407;color:#fb923c">${r.reason}</span>
    </div>
    ${r.date||r.notes?`<div style="display:flex;gap:16px;margin-top:6px;font-size:12px;color:#78716c">${r.date?`<span>📅 Promised ${fmtDate(r.date)}</span>`:''}${r.notes?`<em>"${r.notes}"</em>`:''}</div>`:''}`;
    wrap.appendChild(row);
  });
  return wrap;
}

// ── certificate ──
function renderCert(project){
  let gO=0,gI=0,gH=0;
  const log=project.dailyLog||[];
  const wdays=new Set(log.map(e=>e.date).filter(Boolean)).size;
  const floorData=project.floors.map(f=>{
    const rows=f.doors.map(normDoor).filter(c=>c.total>0).map(c=>{
      const inst=Math.min(c.doorsInstalled,c.readyQty),handed=Math.min(c.handoverQty,inst);
      gO+=c.total;gI+=inst;gH+=handed;
      return{label:c.label,ordered:c.total,installed:inst,handed};
    });
    return{name:f.name,date:f.handoverDate,acceptedBy:f.acceptedBy,rows};
  }).filter(f=>f.rows.length>0);
  const nc=normContacts(project.contacts);
  const bg=div('cert-bg');bg.onclick=()=>{certId=null;render();};
  const actions=div('cert-actions');
  const pb=btn('btn','🖨 Print / Save PDF',()=>window.print());pb.style.cssText='background:#2e1065;color:#8b5cf6;padding:8px 14px;border-radius:8px;font-weight:600';
  const cb=btn('btn btn-ghost','✕ Close',()=>{certId=null;render();});
  actions.append(pb,cb);bg.appendChild(actions);
  const paper=div('cert-paper');paper.onclick=e=>e.stopPropagation();
  paper.innerHTML=`
    <div style="text-align:center;border-bottom:2px solid #1c1917;padding-bottom:16px;margin-bottom:20px">
      <h1 style="font-size:22px;font-weight:700;color:#7c5e10">GEETANJALI WOOD CRAFT</h1>
      <p style="font-size:11px;color:#666">Doors & Interior Fit-outs · Panvel, Raigad, Maharashtra</p>
      <h2 style="font-size:17px;font-weight:600;margin-top:10px">Door Installation & Handover Certificate</h2>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;font-size:13px;margin-bottom:20px">
      <div><b>Project:</b> ${project.name}</div><div><b>Order No:</b> ${project.orderNo||'—'}</div>
      <div><b>Builder:</b> ${project.builder||'—'}</div><div><b>Location:</b> ${project.location||'—'}</div>
      <div><b>Date:</b> ${todayStr()}</div>${wdays?`<div><b>Working days:</b> ${wdays}</div>`:''}
      ${nc.sitePerson.name?`<div><b>Site Person:</b> ${nc.sitePerson.name}</div>`:''}
      ${nc.site.name?`<div><b>Site Incharge:</b> ${nc.site.name}</div>`:''}
    </div>
    ${floorData.map(f=>`
      <div style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;border-bottom:1px solid #ccc;padding-bottom:4px;margin-bottom:4px">
          <b style="font-size:13px">${f.name}</b>
          <span style="font-size:11px;color:#666">${f.date?'Handover: '+fmtDate(f.date):''}${f.acceptedBy?' · Accepted by: '+f.acceptedBy:''}</span>
        </div>
        <table style="width:100%;font-size:13px;border-collapse:collapse">
          <thead><tr style="color:#666;font-size:11px"><th style="text-align:left;padding:3px 0">Door Type</th><th style="text-align:center;padding:3px 0">Ordered</th><th style="text-align:center;padding:3px 0">Installed</th><th style="text-align:center;padding:3px 0">Handed Over</th></tr></thead>
          <tbody>${f.rows.map(r=>`<tr style="border-top:1px solid #eee"><td style="padding:3px 0">${r.label}</td><td style="text-align:center;padding:3px 0">${r.ordered}</td><td style="text-align:center;padding:3px 0">${r.installed}</td><td style="text-align:center;padding:3px 0;font-weight:700">${r.handed}</td></tr>`).join('')}</tbody>
        </table>
      </div>`).join('')}
    <div style="border-top:2px solid #1c1917;padding-top:8px;display:flex;justify-content:space-between;font-size:13px;font-weight:700">
      <span>GRAND TOTAL</span><span>Ordered ${gO} · Installed ${gI} · Handed Over ${gH}</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:48px;font-size:13px">
      <div><div style="border-top:1px solid #333;padding-top:4px">For Geetanjali Wood Craft</div><p style="font-size:11px;color:#666;margin-top:4px">Name & Signature / Date</p></div>
      <div><div style="border-top:1px solid #333;padding-top:4px">Client / Builder Representative</div><p style="font-size:11px;color:#666;margin-top:4px">Name & Signature / Date</p></div>
    </div>
  `;
  bg.appendChild(paper);return bg;
}

// ── boot ──
init();
</script>
</body>
</html>
