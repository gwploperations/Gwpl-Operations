// ── stepper component ──
function makeStepper(value,onSet,color,max,disabled){
  const wrap=h("div",{class:"stepper"});
  if(disabled){wrap.appendChild(h("span",{style:{minWidth:"44px",textAlign:"center",color:color||"inherit",fontSize:"13px",opacity:.7}},[""+value]));return wrap}
  const clamp=v=>Math.min(Math.max(v,0),max!=null?max:9999);
  const btnM=h("button",{},{});btnM.textContent="−";btnM.onclick=()=>onSet(clamp(value-1));
  const inp=h("input",{type:"number",value:""+value,style:{color:color||"inherit"}});
  inp.onchange=e=>onSet(clamp(num(e.target.value)));
  const btnP=h("button",{},{});btnP.textContent="+";btnP.onclick=()=>onSet(clamp(value+1));
  wrap.append(btnM,inp,btnP);return wrap;
}

// ── save helpers ──
function scheduleSave(key,data){
  if(saveTimer[key])clearTimeout(saveTimer[key]);
  saveTimer[key]=setTimeout(()=>kvSet(key,data),800);
}
function saveProjects(){if(JSON.stringify(projects)!==lastSaved.projects){lastSaved.projects=JSON.stringify(projects);scheduleSave("projects",projects)}}
function saveActivity(){if(JSON.stringify(activity)!==lastSaved.activity){lastSaved.activity=JSON.stringify(activity);scheduleSave("activity",activity)}}
function pushActivity(projectName,section){
  const who=userName(),now=Date.now();
  const top=activity[0];
  if(top&&top.who===who&&top.project===projectName&&top.section===section&&now-top.ts<90000){activity[0]={...top,ts:now}}
  else activity=[{id:uid(),who,ts:now,project:projectName,section},...activity].slice(0,200);
  saveActivity();
}
function updateProject(id,fn){
  const now=Date.now();const p=projects.find(x=>x.id===id);
  projects=projects.map(x=>x.id===id?{...fn(x),lastUpdate:{who:userName(),ts:now}}:x);
  pushActivity(p?.name||"a project",currentSection());
  saveProjects();render();
}
function currentSection(){return{projects:"Project",install:"Installation",daily:"Daily Log",hardware:"Hardware",handover:"Handover"}[tab]||"Project"}

// ── realtime ──
let realtimeSetup=false;
function setupRealtime(){
  if(realtimeSetup)return;realtimeSetup=true;
  supabase.channel("kv-rt").on("postgres_changes",{event:"*",schema:"public",table:"kv"},p=>{
    const row=p.new;if(!row)return;
    if(row.key==="projects"){const v=row.value||[];lastSaved.projects=JSON.stringify(v);projects=normalizeProjects(v);render()}
    else if(row.key==="activity"){const v=row.value||[];lastSaved.activity=JSON.stringify(v);activity=v;render()}
    else if(row.key==="admin_pin")pin=row.value||null;
    else if(row.key==="client_pin")clientPin=row.value||null;
  }).subscribe();
}

// ── auth ──
async function init(){
  const{data}=await supabase.auth.getSession();
  session=data.session;
  supabase.auth.onAuthStateChange((_,s)=>{session=s;if(s)loadData();else{loading=false;render()}});
  if(session)await loadData();else{loading=false;render()}
}
async function loadData(){
  loading=true;render();
  const pj=await kvGet("projects");if(pj){const arr=normalizeProjects(pj);lastSaved.projects=JSON.stringify(arr);projects=arr}
  pin=await kvGet("admin_pin");
  clientPin=await kvGet("client_pin");
  const ac=await kvGet("activity");if(ac){lastSaved.activity=JSON.stringify(ac);activity=ac}
  loading=false;setupRealtime();render();
}
async function doRefresh(){
  syncing=true;render();
  const pj=await kvGet("projects");if(pj){const arr=normalizeProjects(pj);lastSaved.projects=JSON.stringify(arr);projects=arr}
  const ac=await kvGet("activity");if(ac){lastSaved.activity=JSON.stringify(ac);activity=ac}
  pin=await kvGet("admin_pin");clientPin=await kvGet("client_pin");
  setTimeout(()=>{syncing=false;render()},400);
}

    gb.disabled=busy;gb.onclick=go;box.appendChild(gb);

    tb.onclick=()=>{mode=mode==="signup"?"signin":"signup";err="";msg="";rebuild()};box.appendChild(tb);

function renderPinModal(isClient){
  const isNew=isClient?clientPin===null:pin===null;

  const purpose=isClient?"only the client can confirm handover":"protects total quantities & door structure";
  let val="",err="";

  const modal=h("div",{class:"modal",style:{maxWidth:"360px"}});modal.onclick=e=>e.stopPropagation();
  const rebuild=()=>{
    modal.innerHTML="";

    const ht=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",fontWeight:"600",color:"var(--amber)"}});ht.appendChild(icon("key",16));ht.appendChild(document.createTextNode(` ${isNew?"Set":"Enter"} ${name} PIN`));mh.appendChild(ht);

    modal.appendChild(h("p",{style:{fontSize:"12px",color:"var(--text2)",marginBottom:"14px"}},[ isNew?`Set a ${name} PIN — ${purpose}.`:`Enter the ${name} PIN.`]));
    const pi=h("input",{type:"password",placeholder:"PIN",value:val,style:{textAlign:"center",letterSpacing:"6px",marginBottom:"8px"}});pi.oninput=e=>{val=e.target.value;err=""};

    setTimeout(()=>pi.focus(),50);
  };
  const go=()=>{
    if(val.trim().length<4){err="Use at least 4 characters.";rebuild();return}
    if(isClient){
      if(clientPin===null){kvSet("client_pin",val.trim());clientPin=val.trim();clientUnlocked=true;showModal=null;render()}
      else if(val.trim()===clientPin){clientUnlocked=true;showModal=null;render()}

    }
  };
  rebuild();overlay.appendChild(modal);return overlay;
}

  const overlay=h("div",{class:"cert-overlay"});overlay.onclick=()=>{certId=null;render()};
  const noprt=h("div",{class:"cert-no-print"});
  const pb=h("button",{class:"btn",style:{background:"var(--violet-bg)",color:"var(--violet)"}});pb.appendChild(icon("printer",16));pb.appendChild(document.createTextNode(" Print / Save PDF"));pb.onclick=()=>window.print();noprt.appendChild(pb);
  const cb=h("button",{class:"btn btn-ghost"});cb.appendChild(icon("x",16));cb.appendChild(document.createTextNode(" Close"));cb.onclick=()=>{certId=null;render()};noprt.appendChild(cb);
  overlay.appendChild(noprt);
  const paper=h("div",{class:"cert-paper",style:{fontFamily:"Georgia,serif"}});paper.onclick=e=>e.stopPropagation();
  paper.innerHTML=`
    <div style="text-align:center;border-bottom:2px solid #1c1917;padding-bottom:16px;margin-bottom:20px">
      <h1 style="font-size:22px;font-weight:700;letter-spacing:1px;color:#7c5e10">GEETANJALI WOOD CRAFT</h1>
      <p style="font-size:11px;color:#666">Doors & Interior Fit-outs · Panvel, Raigad, Maharashtra</p>
      <h2 style="font-size:17px;font-weight:600;margin-top:10px">Door Installation & Handover Certificate</h2>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;font-size:13px;margin-bottom:20px">
      <div><b>Project:</b> ${project.name}</div><div><b>Order No:</b> ${project.orderNo||"—"}</div>
      <div><b>Builder:</b> ${project.builder||"—"}</div><div><b>Location:</b> ${project.location||"—"}</div>
      <div><b>Certificate date:</b> ${todayStr()}</div>${wdays?`<div><b>Work completed in:</b> ${wdays} working days</div>`:""}
      ${nc.sitePerson.name?`<div><b>Geetanjali Site Person:</b> ${nc.sitePerson.name}${nc.sitePerson.phone?" ("+nc.sitePerson.phone+")":""}</div>`:""}
      ${nc.site.name?`<div><b>Site Incharge:</b> ${nc.site.name}${nc.site.phone?" ("+nc.site.phone+")":""}</div>`:""}
    </div>
    ${floorData.length?floorData.map(f=>`
      <div style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;border-bottom:1px solid #ccc;padding-bottom:4px;margin-bottom:4px">
          <b style="font-size:13px">${f.name}</b>
          <span style="font-size:11px;color:#666">${f.date?`Handover: ${fmtDate(f.date)}`:""}${f.acceptedBy?` · Accepted by: ${f.acceptedBy}`:""}</span>
        </div>
        <table style="width:100%;font-size:13px;border-collapse:collapse">
          <thead><tr style="color:#666;font-size:11px;text-align:left"><th style="padding:3px 0">Door Type</th><th style="padding:3px 0;text-align:center">Ordered</th><th style="padding:3px 0;text-align:center">Installed</th><th style="padding:3px 0;text-align:center">Handed Over</th></tr></thead>
          <tbody>${f.rows.map(r=>`<tr style="border-top:1px solid #e5e5e5"><td style="padding:3px 0">${r.label}</td><td style="padding:3px 0;text-align:center">${r.ordered}</td><td style="padding:3px 0;text-align:center">${r.installed}</td><td style="padding:3px 0;text-align:center;font-weight:700">${r.handed}</td></tr>`).join("")}</tbody>
        </table>
      </div>`).join(""):"<p style='font-size:13px;color:#888;font-style:italic'>No produced doors recorded yet.</p>"}
    <div style="border-top:2px solid #1c1917;padding-top:8px;display:flex;justify-content:space-between;font-size:13px;font-weight:700">
      <span>GRAND TOTAL</span><span>Ordered ${gO} · Installed ${gI} · Handed Over ${gH}</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:48px;font-size:13px">
      <div><div style="border-top:1px solid #333;padding-top:4px">For Geetanjali Wood Craft</div><p style="font-size:11px;color:#666;margin-top:4px">Name & Signature / Date</p></div>
      <div><div style="border-top:1px solid #333;padding-top:4px">Client / Builder Representative</div><p style="font-size:11px;color:#666;margin-top:4px">Name & Signature / Date</p></div>
    </div>
    <p style="font-size:10px;color:#999;margin-top:32px;text-align:center">This certificate confirms the doors listed above have been installed and handed over as recorded.</p>
  `;
  overlay.appendChild(paper);return overlay;
}

// ── boot ──
init();
</script>
</body>
</html>
