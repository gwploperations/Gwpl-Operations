function generateLetterContent(emp, type, extra){
  const today = fmtDate(todayIso());
  const mgr = emp.managerId ? getEmp(emp.managerId) : null;
  const ctc = estimateCtc(emp);
  let subject = '', body = '';

  if(type==='offer'){
    subject = 'Offer of Employment';
    body = `<p>Dear ${emp.name},</p>
      <p>We are pleased to offer you the position of <b>${emp.role}</b> in the ${emp.dept} department at Geetanjali Woodcraft Pvt. Ltd., based at ${emp.location}.</p>
      <p>Your proposed date of joining is <b>${fmtDate(extra.joinDate || emp.joinDate)}</b>, with an annual CTC of <b>₹${Number(extra.ctc||ctc).toLocaleString('en-IN')}</b>.</p>
      <p>This offer is subject to verification of documents and references. Please confirm your acceptance by signing and returning a copy of this letter.</p>`;
  } else if(type==='appointment'){
    subject = 'Letter of Appointment';
    body = `<p>Dear ${emp.name},</p>
      <p>Further to your acceptance of our offer, we are pleased to confirm your appointment as <b>${emp.role}</b> in the ${emp.dept} department, effective <b>${fmtDate(extra.joinDate || emp.joinDate)}</b>.</p>
      <p>Your annual CTC is <b>₹${Number(extra.ctc||ctc).toLocaleString('en-IN')}</b>. You will report to ${mgr ? mgr.name : 'the department head'}.</p>
      <p>Your employment is governed by GWPL's HR policies as amended from time to time.</p>`;
  } else if(type==='confirmation'){
    subject = 'Confirmation of Employment';
    body = `<p>Dear ${emp.name},</p>
      <p>We are pleased to inform you that your probationary period has been successfully completed, and your employment as <b>${emp.role}</b> stands confirmed with effect from <b>${fmtDate(extra.confirmDate)}</b>.</p>
      <p>All other terms of your appointment letter continue to apply.</p>`;
  } else if(type==='promotion'){
    subject = 'Letter of Promotion';
    body = `<p>Dear ${emp.name},</p>
      <p>We are pleased to inform you of your promotion from <b>${emp.role}</b> to <b>${escapeHtml(extra.newDesignation)}</b>, effective <b>${fmtDate(extra.effectiveDate)}</b>.</p>
      <p>Your revised annual CTC will be <b>₹${Number(extra.newCtc||0).toLocaleString('en-IN')}</b>.</p>
      <p>We congratulate you on this achievement and look forward to your continued contribution to GWPL.</p>`;
  } else if(type==='experience'){
    subject = 'Experience Certificate';
    body = `<p>This is to certify that <b>${emp.name}</b> was employed with Geetanjali Woodcraft Pvt. Ltd. as <b>${emp.role}</b> in the ${emp.dept} department from <b>${fmtDate(emp.joinDate)}</b> to <b>${fmtDate(extra.lastWorkingDay)}</b>.</p>
      <p>During this tenure, we found them sincere, hardworking, and professional in their conduct. We wish them success in their future endeavours.</p>`;
  } else if(type==='relieving'){
    subject = 'Relieving Letter';
    body = `<p>Dear ${emp.name},</p>
      <p>This is to confirm that you have been relieved from your duties as <b>${emp.role}</b> at Geetanjali Woodcraft Pvt. Ltd. with effect from <b>${fmtDate(extra.lastWorkingDay)}</b>, following your separation from the organization.</p>
      <p>We thank you for your contributions during your tenure and wish you the very best in your future endeavours.</p>`;
  }

  return `
    ${letterHeader()}
    <div style="text-align:right;font-size:12px;color:var(--ink-soft);margin-bottom:16px;">${today}</div>
    <div style="font-size:15px;font-weight:700;margin-bottom:16px;">${subject}</div>
    <div style="font-size:13.5px;line-height:1.8;">${body}</div>
    ${letterFooter()}
  `;
}

/* ---------- Email a letter directly to the employee (v2.3) ----------
   Live mode: calls a Supabase Edge Function called "send-letter" which does
   the actual SMTP/Resend send server-side (the browser never holds mail
   credentials). Deploy that function once and this button just works.
   Fallback (function not deployed / offline): opens the device's mail app
   with a plain-text version pre-filled. */
async function emailLetter(){
  const m = state.modal;
  if(!m || m.type !== 'letterPreview') return;
  const { emp, type, extra } = m.payload;
  const subject = `${LETTER_TYPES[type].label} — Geetanjali Woodcraft Pvt. Ltd.`;

  if(USE_SUPABASE){
    toast(`Sending ${LETTER_TYPES[type].label} to ${emp.email}...`);
    const html = `<div style="max-width:760px;margin:0 auto;font-family:Georgia,'Times New Roman',serif;color:#24272F;">${generateLetterContent(emp, type, extra)}</div>`;
    try {
      const { data, error } = await sb.functions.invoke('send-letter', {
        body: { to: emp.email, subject, html },
      });
      if(error) throw error;
      toast(`${LETTER_TYPES[type].label} emailed to ${emp.email} ✓`);
      return;
    } catch(err){
      toast('Could not send via email service — the "send-letter" Edge Function isn\'t deployed yet. Opening your mail app instead.');
    }
  }

  // Fallback: mailto with a plain-text body (mail apps can't take HTML via mailto)
  const el = document.createElement('div');
  el.innerHTML = generateLetterContent(emp, type, extra);
  const plain = el.innerText.replace(/\n{3,}/g, '\n\n').trim();
  window.location.href = `mailto:${emp.email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(plain)}`;
}

function renderLetters(user){
  const lf = state.letterForm;
  if(!lf.employeeId || !getEmp(lf.employeeId)) lf.employeeId = DB.employees[0].id;
  const emp = getEmp(lf.employeeId);
  const meta = LETTER_TYPES[lf.type];

  const extraFields = () => {
    if(lf.type==='offer' || lf.type==='appointment') return `
      <div class="row-2">
        <div class="field"><label>Joining date</label><input type="date" id="lf-joinDate" value="${emp.joinDate||''}"></div>
        <div class="field"><label>Annual CTC (₹)</label><input type="number" id="lf-ctc" value="${estimateCtc(emp)}"></div>
      </div>`;
    if(lf.type==='confirmation') return `<div class="field"><label>Confirmation date</label><input type="date" id="lf-confirmDate" value="${todayIso()}"></div>`;
    if(lf.type==='promotion') return `
      <div class="row-2">
        <div class="field"><label>New designation</label><input id="lf-newDesignation" placeholder="e.g. Senior Production Manager"></div>
        <div class="field"><label>Revised annual CTC (₹)</label><input type="number" id="lf-newCtc" value="${estimateCtc(emp)}"></div>
      </div>
      <div class="field"><label>Effective date</label><input type="date" id="lf-effectiveDate" value="${todayIso()}"></div>`;
    if(lf.type==='experience' || lf.type==='relieving'){
      const sep = DB.separations.find(s=>s.employeeId===emp.id && s.status==='approved');
      return `<div class="field"><label>Last working day</label><input type="date" id="lf-lastWorkingDay" value="${sep ? sep.lastWorkingDay : ''}"></div>`;
    }
    return '';
  };

  return `
    <div class="page-head">
      <div class="eyebrow">Document automation</div>
      <h1>Letters</h1>
      <p>Generate offer, appointment, confirmation, promotion, experience, and relieving letters — email them directly to the employee, or print/save as PDF.</p>
    </div>

    <div class="card" style="max-width:640px;margin-bottom:16px;">
      <div class="card-head"><h3>Official letterhead</h3>${LETTERHEAD ? '<span class="tag tag-approved">Custom upload in use</span>' : '<span class="tag tag-approved">GWPL letterhead embedded</span>'}</div>
      <div class="hint" style="margin-bottom:10px;">GWPL's official letterhead is built into the app and used on every letter. If it ever changes, upload the new banner image here to override it on this device.</div>
      <input type="file" accept="image/*" onchange="uploadLetterhead(this)">
      ${LETTERHEAD ? `<div style="margin-top:10px;"><img src="${LETTERHEAD}" style="width:100%;border:1px solid var(--border);border-radius:8px;"><div style="margin-top:8px;"><button class="btn btn-sm btn-danger-outline" onclick="removeLetterhead()">Remove upload & use official letterhead</button></div></div>` : ''}
    </div>

    <div class="card" style="max-width:640px;">
      <div class="row-2">
        <div class="field"><label>Employee</label>
          <select id="lf-employeeId" onchange="updateLetterForm('employeeId', this.value)">
            ${DB.employees.map(e=>`<option value="${e.id}" ${e.id===lf.employeeId?'selected':''}>${e.name}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label>Letter type</label>
          <select id="lf-type" onchange="updateLetterForm('type', this.value)">
            ${Object.entries(LETTER_TYPES).map(([k,v])=>`<option value="${k}" ${k===lf.type?'selected':''}>${v.label}</option>`).join('')}
          </select>
        </div>
      </div>
      <div id="lf-extra-fields">${extraFields()}</div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:6px;" onclick="previewLetter()">${ICON.mail} Preview → email or print</button>
    </div>
  `;
}

function updateLetterForm(field, value){
  state.letterForm[field] = value;
  render();
}

function previewLetter(){
  const lf = state.letterForm;
  const emp = getEmp(lf.employeeId);
  const extra = {
    joinDate: document.getElementById('lf-joinDate')?.value,
    ctc: document.getElementById('lf-ctc')?.value,
    confirmDate: document.getElementById('lf-confirmDate')?.value,
    newDesignation: document.getElementById('lf-newDesignation')?.value,
    newCtc: document.getElementById('lf-newCtc')?.value,
    effectiveDate: document.getElementById('lf-effectiveDate')?.value,
    lastWorkingDay: document.getElementById('lf-lastWorkingDay')?.value,
  };
  const meta = LETTER_TYPES[lf.type];
  const missing = meta.needs.filter(k => !extra[k]);
  if(missing.length>0){ toast('Please fill in all fields for this letter.'); return; }
  openModal('letterPreview', { emp, type:lf.type, extra });
}

/**
 * GWPL People — statutory payroll calculations
 * ----------------------------------------------------------------------------
 * v2.3: computes from each employee's REAL salary structure (set by admin),
 * never from role templates. Rules as of early 2026 — re-verify before
 * relying on this for live payroll:
 *   - PF: 12% of Basic, employee + employer each (basis configurable below).
 *   - ESI: only if gross monthly wage ≤ ₹21,000. Employee 0.75%, employer 3.25%.
 *   - Professional Tax: state slabs (Maharashtra/Gujarat).
 *   - TDS: rough new-regime estimate, no declared exemptions — ballpark only.
 */

const PF_RATE = 0.12;
const PF_ON_FULL_BASIC = true; // false = cap PF-eligible basic at ₹15,000
const PF_WAGE_CEILING = 15000;

const ESI_WAGE_THRESHOLD = 21000;
const ESI_EMPLOYEE_RATE = 0.0075;
const ESI_EMPLOYER_RATE = 0.0325;

function professionalTax(grossMonthly, state) {
  if (state === 'Maharashtra') {
    if (grossMonthly <= 7500) return 0;
    if (grossMonthly <= 10000) return 175;
    return 200; // simplified; Feb is often ₹300 in Maharashtra's actual slab — adjust if needed
  }
  if (state === 'Gujarat') {
    if (grossMonthly <= 12000) return 0;
    return 200;
  }
  return 0;
}

function stateForLocation(location) {
  if (/kutch/i.test(location)) return 'Gujarat';
  if (/panvel/i.test(location)) return 'Maharashtra';
  return 'Maharashtra';
}

function estimateAnnualTax(annualIncome) {
  const slabs = [
    { upto: 300000, rate: 0 },
    { upto: 600000, rate: 0.05 },
    { upto: 900000, rate: 0.10 },
    { upto: 1200000, rate: 0.15 },
    { upto: 1500000, rate: 0.20 },
    { upto: Infinity, rate: 0.30 },
  ];
  let tax = 0, lastCap = 0;
  for (const slab of slabs) {
    if (annualIncome > lastCap) {
      const taxableInSlab = Math.min(annualIncome, slab.upto) - lastCap;
      tax += taxableInSlab * slab.rate;
      lastCap = slab.upto;
    }
  }
  if (annualIncome <= 700000) tax = 0; // 87A-style rebate approximation
  return Math.round(tax);
}

/**
 * Computes a full statutory payslip breakdown for one employee for one month.
 * `salary` is the employee's real { basic, hra, special } (monthly ₹).
 */
function computeStatutoryPayslip(emp, salary, monthLabel) {
  const basic = Number(salary.basic) || 0;
  const hra = Number(salary.hra) || 0;
  const special = Number(salary.special) || 0;
  const gross = basic + hra + special;

  const pfEligibleBasic = PF_ON_FULL_BASIC ? basic : Math.min(basic, PF_WAGE_CEILING);
  const pfEmployee = Math.round(pfEligibleBasic * PF_RATE);
  const pfEmployer = Math.round(pfEligibleBasic * PF_RATE);

  const esiApplicable = gross <= ESI_WAGE_THRESHOLD;
  const esiEmployee = esiApplicable ? Math.round(gross * ESI_EMPLOYEE_RATE) : 0;
  const esiEmployer = esiApplicable ? Math.round(gross * ESI_EMPLOYER_RATE) : 0;

  const state = stateForLocation(emp.location || '');
  const pt = professionalTax(gross, state);

  const annualGross = gross * 12;
  const estimatedAnnualTax = estimateAnnualTax(annualGross);
  const monthlyTds = Math.round(estimatedAnnualTax / 12);

  const totalDeductions = pfEmployee + esiEmployee + pt + monthlyTds;
  const net = gross - totalDeductions;

  return {
    monthLabel,
    basic, hra, special, gross,
    pfEmployee, pfEmployer, pfEligibleBasic,
    esiApplicable, esiEmployee, esiEmployer,
    ptState: state, pt,
    estimatedAnnualTax, monthlyTds,
    totalDeductions, net,
  };
}

<script>
  // Single-file build: no service worker. Also actively UNREGISTER any old
  // service worker + clear its caches — earlier versions shipped a cache-first
  // worker that could pin browsers to a stale copy. This self-heals everyone.
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations()
      .then(regs => regs.forEach(r => r.unregister()))
      .catch(()=>{});
  }
  if(window.caches && caches.keys){
    caches.keys().then(keys => keys.forEach(k => caches.delete(k))).catch(()=>{});
  }
</script>
