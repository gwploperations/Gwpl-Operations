<script>
/* GWPL People — crash visibility. If anything goes wrong during load, show it
   on screen instead of a blank page, so it can be screenshotted and fixed. */
window.__gwplPaintError = function(msg){
  try {
    var box = document.getElementById('gwpl-fatal');
    if(!box){
      box = document.createElement('div');
      box.id = 'gwpl-fatal';
      box.style.cssText = 'position:fixed;top:12px;left:12px;right:12px;z-index:99999;background:#FCE4E4;border:2px solid #E5484D;border-radius:10px;padding:14px 16px;font:13px/1.6 system-ui,sans-serif;color:#7A1B1F;box-shadow:0 8px 30px rgba(0,0,0,0.15);max-height:45vh;overflow:auto;';
      box.innerHTML = '<b>GWPL People hit an error while loading.</b><br>Screenshot this box and send it to the admin.<div id="gwpl-fatal-list" style="margin-top:8px;font-family:monospace;font-size:11.5px;white-space:pre-wrap;"></div><div style="margin-top:10px;"><button onclick="location.reload(true)" style="padding:6px 14px;border:1px solid #E5484D;background:#fff;border-radius:6px;cursor:pointer;">Reload</button></div>';
      (document.body || document.documentElement).appendChild(box);
    }
    var list = document.getElementById('gwpl-fatal-list');
    if(list){ list.textContent += (list.textContent ? '\n' : '') + msg; }
  } catch(e){}
};
window.addEventListener('error', function(ev){
  window.__gwplPaintError((ev.message || 'Script error') + (ev.filename ? ' @ ' + ev.filename.split('/').pop() + ':' + ev.lineno : ''));
});
window.addEventListener('unhandledrejection', function(ev){
  var r = ev.reason || {};
  window.__gwplPaintError('Unhandled: ' + (r.message || String(r)));
});
</script>

<style>
:root{
  --bg:#F4F3FB;
  --surface:#FFFFFF;
  --surface-2:#F7F6FC;
  --ink:#24272F;
  --ink-soft:#6E7180;
  --border:#E6E4F2;
  --primary:#7C46F1;
  --primary-dark:#6631DB;
  --primary-tint:#EEE7FD;
  --blue:#1077DA;
  --blue-tint:#E4F0FC;
  --green:#1C9A6C;
  --green-tint:#DFF5EC;
  --amber:#D08A1E;
  --amber-tint:#FBEDD6;
  --red:#E5484D;
  --red-tint:#FCE4E4;
  --radius:10px;
  --shadow:0 1px 2px rgba(36,39,47,0.06), 0 4px 16px rgba(36,39,47,0.05);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.serif{font-family:'Fraunces',serif;}
a{color:inherit;}
button{font-family:'Inter',sans-serif;cursor:pointer;}
::selection{background:var(--primary-tint);}

/* ---------- Layout shell ---------- */
#app{display:flex;min-height:100vh;}

/* Sidebar */
.sidebar{
  width:236px;
  flex-shrink:0;
  background:linear-gradient(180deg,#24272F 0%, #1B1E27 100%);
  color:#E9E9F2;
  display:flex;
  flex-direction:column;
  position:relative;
  overflow:hidden;
}
.sidebar::before{
  content:"";
  position:absolute; inset:0;
  background-image:repeating-linear-gradient(100deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 2px, transparent 2px, transparent 22px);
  pointer-events:none;
}
.brand{
  padding:22px 20px 18px 20px;
  display:flex; align-items:center; gap:10px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  position:relative; z-index:1;
}
.brand-mark{
  width:34px;height:34px;border-radius:8px;
  background:linear-gradient(135deg,var(--primary),var(--blue));
  display:flex;align-items:center;justify-content:center;
  font-family:'Fraunces',serif;font-weight:700;font-size:16px;color:#fff;
  flex-shrink:0;
}
.brand-text .name{font-family:'Fraunces',serif;font-weight:600;font-size:15px;letter-spacing:0.2px;}
.brand-text .sub{font-size:10.5px;color:#B8AE9E;letter-spacing:0.6px;text-transform:uppercase;}

.nav{padding:14px 12px;flex:1;position:relative;z-index:1;overflow-y:auto;}
.nav-section-label{font-size:10.5px;text-transform:uppercase;letter-spacing:0.8px;color:#8A8071;padding:14px 10px 6px 10px;}
.nav-item{

<script>
/**
 * GWPL People — Supabase client module
 * ----------------------------------------------------------------------------
 * v2.3 note: employees now carry birthday, salary, bank, and is_admin.
 * Regularizations now carry requested_in / requested_out times.
 * If those columns don't exist yet in your live project, run the SQL
 * migration shared alongside this build — until then the app degrades
 * gracefully (those fields stay local for the session).
 */

const SUPABASE_URL = 'https://grtmsqdpzhusdyrnwuzr.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdydG1zcWRwemh1c2R5cm53dXpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMjc1NjMsImV4cCI6MjA5ODkwMzU2M30.3Pu0sMWHngMCjRG0C9mVhT7Ub5VW5Rp0pjtbddZV2eM';

const sb = (typeof window !== 'undefined' && window.supabase)
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,       // keep the session across refreshes
        autoRefreshToken: true,     // renew tokens automatically
        detectSessionInUrl: true,   // handle recovery/confirmation links
        storage: (typeof window !== 'undefined' && window.localStorage) ? window.localStorage : undefined,
      },
    })
  : null;

/* ============================================================================
 * AUTH
 * ========================================================================== */
const GwplAuth = {
  async signIn(identifier, password) {
    const { data: email, error: resolveError } = await sb.rpc('resolve_login_email', { identifier });
    if (resolveError || !email) {
      return { error: { message: 'This email or mobile is not registered. Contact HR/Admin.' } };
    }
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    return { data, error };
  },

  async requestPasswordReset(identifier) {
    const { data: email, error: resolveError } = await sb.rpc('resolve_login_email', { identifier });
    if (resolveError || !email) {
      return { error: { message: 'No account found with that email/mobile.' } };
    }
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: `${window.location.origin}${window.location.pathname}?mode=reset`,
    });
    return { error };
  },

  async updatePassword(newPassword) {
    const { error } = await sb.auth.updateUser({ password: newPassword });
    return { error };
  },

  async signOut() {
    await sb.auth.signOut();
  },

  onAuthStateChange(callback) {
    return sb.auth.onAuthStateChange((_event, session) => callback(session));
  },

  async getCurrentSession() {
    const { data } = await sb.auth.getSession();
    return data.session;
  },

  async inviteEmployees(employeesArray) {
    const { data, error } = await sb.functions.invoke('invite-employee', {
      body: { employees: employeesArray },
    });
    return { data, error };
  },
};

/* ============================================================================
 * GENERIC TABLE HELPERS
 * ========================================================================== */
function makeTableApi(tableName) {
  return {
    async list(orderBy) {
      let q = sb.from(tableName).select('*');
      if (orderBy) q = q.order(orderBy);
      const { data, error } = await q;
      if (error) console.error(`[${tableName}] list error:`, error.message);
      return data || [];
    },
    async insert(row) {
      const { data, error } = await sb.from(tableName).insert(row).select().single();
      if (error) console.error(`[${tableName}] insert error:`, error.message);
      return { data, error };
    },
    async update(id, patch) {
      const { data, error } = await sb.from(tableName).update(patch).eq('id', id).select().single();
      if (error) console.error(`[${tableName}] update error:`, error.message);
      return { data, error };
    },
    async remove(id) {
      const { error } = await sb.from(tableName).delete().eq('id', id);
      if (error) console.error(`[${tableName}] delete error:`, error.message);
      return { error };
    },
    subscribe(onChange) {
      const channel = sb
        .channel(`realtime:${tableName}`)
        .on('postgres_changes', { event: '*', schema: 'public', table: tableName }, onChange)
        .subscribe();
      return () => sb.removeChannel(channel);
    },
  };
}

const Employees = makeTableApi('employees');
const Attendance = makeTableApi('attendance');
const Regularizations = makeTableApi('regularizations');

const SiteVisitCheckins = makeTableApi('site_visit_checkins');
const LiveTrackingSessions = makeTableApi('live_tracking_sessions');
const Separations = makeTableApi('separations');
const Announcements = makeTableApi('announcements');
const LettersIssued = makeTableApi('letters_issued');
const Posts = makeTableApi('posts');
const Wishes = makeTableApi('wishes');
const CompOffs = makeTableApi('comp_offs');
const Payslips = makeTableApi('payslips');

/* ============================================================================
 * FILE UPLOAD (reimbursement bills)
 * ========================================================================== */
const Bills = {
  async upload(employeeId, file) {
    const path = `${employeeId}/${Date.now()}_${file.name}`;
    const { error } = await sb.storage.from('reimbursement-bills').upload(path, file);
    if (error) { console.error('Bill upload error:', error.message); return { error }; }
    return { path };
  },
  async getSignedUrl(path) {
    const { data, error } = await sb.storage.from('reimbursement-bills').createSignedUrl(path, 3600);
    if (error) { console.error('Signed URL error:', error.message); return null; }
    return data.signedUrl;
  },
};

/* ============================================================================
 * MAPPING: Supabase rows (snake_case) <-> app's internal objects (camelCase)
 * ========================================================================== */
function normalizeBalance(b){
  b = b || {};
  // v2.3: casual + sick merged into a single CSL bucket (credited 2/quarter).
  return {
    csl: (b.csl !== undefined && b.csl !== null) ? Number(b.csl) : ((Number(b.casual)||0) + (Number(b.sick)||0)),
    earned: Number(b.earned) || 0,
  };
}

function mapEmployeeFromRow(row) {
  return {
    id: row.id,
    userId: row.user_id,
    name: row.name,
    role: row.role,
    dept: row.dept,
    location: row.location,
    managerId: row.manager_id,
    email: row.email,
    mobile: row.mobile,
    esslCode: row.essl_code,
    userRole: row.user_role,
    isAdmin: row.is_admin === true || row.user_role === 'director' || row.user_role === 'hr_manager',
    workMode: row.work_mode,
    status: row.status,
    joinDate: row.join_date,
    birthday: row.birthday || null,
    salary: row.salary || null,     // { basic, hra, special } — monthly ₹
    bank: row.bank || null,         // { bankName, accountNo, ifsc, holder }
    leaveBalance: normalizeBalance(row.leave_balance || { casual: 12, sick: 10, earned: 6 }),
  };
}

/* ============================================================================
 * LOADING EVERYTHING AT ONCE (used on app boot when USE_SUPABASE is true)
 * ========================================================================== */
async function loadAllFromSupabase() {
  const [
    employees, attendance, regularizations, leaves, okrs, keyResults, oneOnOnes,
    pips, surveys, surveyResponses, tickets, ticketComments, reimbursements,
    assets, holidays, siteVisits, siteVisitCheckins, separations, announcements,
  ] = await Promise.all([
    Employees.list(), Attendance.list(), Regularizations.list(), Leaves.list(),
    Okrs.list(), KeyResults.list(), OneOnOnes.list(), Pips.list(), Surveys.list(),
    SurveyResponses.list(), Tickets.list(), TicketComments.list(), Reimbursements.list(),
    Assets.list(), Holidays.list(), SiteVisits.list(), SiteVisitCheckins.list(),
    Separations.list(), Announcements.list(),
  ]);
  return {
    employees, attendance, regularizations, leaves, okrs, keyResults, oneOnOnes,
    pips, surveys, surveyResponses, tickets, ticketComments, reimbursements,
    assets, holidays, siteVisits, siteVisitCheckins, separations, announcements,
  };
}

function mapAttendanceFromRow(r) {
  return {
    id: r.id,
    employeeId: r.employee_id,
    esslCode: r.essl_code,
    date: r.date,
    checkIn: r.check_in ? String(r.check_in).slice(0, 5) : '—',
    checkOut: r.check_out ? String(r.check_out).slice(0, 5) : '—',
    status: r.status,
    source: r.source || '',
  };
}

function mapRegularizationFromRow(r) {
  return {
    id: r.id,
    employeeId: r.employee_id,
    dates: r.dates || [],
    reason: r.reason,
    requestedIn: r.requested_in ? String(r.requested_in).slice(0,5) : null,
    requestedOut: r.requested_out ? String(r.requested_out).slice(0,5) : null,
    status: r.status,
    appliedOn: r.applied_on,
  };
}

function mapHolidayFromRow(r) {
  return { id: r.id, name: r.name, date: r.date, type: r.type };
}

// Haversine distance in km between two lat/lng points
function haversineKm(lat1, lon1, lat2, lon2){
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLon = (lon2-lon1) * Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function computeVisitKm(visit){
  let total = 0;
  for(let i=1;i<visit.checkIns.length;i++){
    const a = visit.checkIns[i-1], b = visit.checkIns[i];
    total += haversineKm(a.lat,a.lng,b.lat,b.lng);
  }
  visit.totalKm = Math.round(total*10)/10;
  return visit.totalKm;
}
DB.siteVisits.forEach(computeVisitKm);

/* ---------------------------- Fireworks (birthday wishes) ---------------------------- */
function launchFireworks(durationMs){
  const layer = document.createElement('div');
  layer.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden;';
  document.body.appendChild(layer);
  const colors = ['#7C46F1','#1077DA','#1C9A6C','#D08A1E','#E5484D','#F5C518','#FF7AC6'];
  const burst = () => {
    const cx = 12 + Math.random()*76, cy = 10 + Math.random()*55;
    for(let i=0;i<26;i++){
      const p = document.createElement('div');
      const ang = Math.random()*Math.PI*2, dist = 45 + Math.random()*95;
      const size = 5 + Math.random()*4;
      p.style.cssText = `position:absolute;left:${cx}%;top:${cy}%;width:${size}px;height:${size}px;border-radius:50%;background:${colors[i%colors.length]};opacity:1;transform:translate(0,0);transition:transform .95s cubic-bezier(0.1,0.6,0.3,1), opacity .95s ease-out;box-shadow:0 0 8px ${colors[i%colors.length]};`;
      layer.appendChild(p);
      requestAnimationFrame(()=>{
        p.style.transform = `translate(${Math.cos(ang)*dist}px, ${Math.sin(ang)*dist + 40}px)`;
        p.style.opacity = '0';
      });
      setTimeout(()=>p.remove(), 1000);
    }
  };
  burst();
  const iv = setInterval(burst, 380);
  setTimeout(()=>{ clearInterval(iv); setTimeout(()=>layer.remove(), 1050); }, durationMs || 3000);
}

        </select>

      </div>
    </div>`;

  const feed = `

let _charts = {};
function initDashboardCharts(user){
  if(typeof Chart === 'undefined' || !isAdminUser(user)) return;
  const headcountCanvas = document.getElementById('chart-headcount');
  const leavesCanvas = document.getElementById('chart-leaves');
  if(!headcountCanvas || !leavesCanvas) return;

  if(_charts.headcount) _charts.headcount.destroy();
  if(_charts.leaves) _charts.leaves.destroy();

  const depts = [...new Set(DB.employees.map(e=>e.dept))];
  const deptCounts = depts.map(d=>DB.employees.filter(e=>e.dept===d).length);
  const purpleShades = ['#7C46F1','#1077DA','#1C9A6C','#D08A1E','#E5484D','#9B59F0'];

  _charts.headcount = new Chart(headcountCanvas, {
    type:'doughnut',
    data:{ labels:depts, datasets:[{ data:deptCounts, backgroundColor:purpleShades, borderWidth:0 }] },
    options:{ maintainAspectRatio:false, plugins:{ legend:{ position:'bottom', labels:{ boxWidth:10, font:{ family:'Inter', size:11 } } } } }
  });

  const statuses = ['pending','approved','rejected'];
  const statusCounts = statuses.map(s=>DB.leaves.filter(l=>l.status===s).length);
  _charts.leaves = new Chart(leavesCanvas, {
    type:'bar',
    data:{ labels:['Pending','Approved','Rejected'], datasets:[{ data:statusCounts, backgroundColor:['#D08A1E','#1C9A6C','#E5484D'], borderRadius:6, maxBarThickness:46 }] },
    options:{ maintainAspectRatio:false, plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true, ticks:{ stepSize:1 } } } }
  });
}

function renderOrgChart(user){

      </div>

  let html = `
    <div class="page-head">

      <h1>Org Chart</h1>

    </div>
    <div class="card" style="overflow-x:auto;">
      <div class="org-wrap">
        <div class="org-level">${orgCard(director)}</div>
        <div class="org-connector"></div>

          ${managers.map(m=>orgCard(m)).join('')}

          ${managers.map(m=>{

            return `<div style="display:flex;flex-direction:column;align-items:center;gap:14px;">

          }).join('')}

    </div>`;
  return html;
}

<script>

            <b style="color:var(--ink);">Earned Leave</b> — 1.5 credited every month. Max <b>10 EL carried forward</b> to the next year; the rest lapses.<br>
            <b style="color:var(--ink);">Comp-off</b> — worked on a leave day or holiday? You're credited a comp-off the next day. <b>Use it within 45 days</b> or it lapses.
          </div>
        </div>
      </div>
    </div>
  `;
}

/* ---------- Leave policy engine ----------
   Rule 1: a single request longer than 2 days needs >= 7 days notice.
   Rule 2 (anti-stacking): a new request that is adjacent to (touching)
   existing pending/approved leaves is treated as ONE combined stretch —
   if the combined stretch is longer than 2 days, the whole stretch also
   needs >= 7 days notice from the stretch's first day. So "2 days + 2 days
   + 2 days" back-to-back gets blocked exactly like a 6-day request would. */
function validateLeaveRequest(employeeId, from, to){
  const dayMs = 86400000;
  const start = new Date(from+'T00:00:00');
  const end = new Date(to+'T00:00:00');
  const days = Math.round((end - start)/dayMs) + 1;
  const today = new Date(); today.setHours(0,0,0,0);
  const noticeDays = Math.round((start - today)/dayMs);

  if(start < today) return { ok:false, msg:'Leave cannot start in the past. For past dates, raise a regularization instead.' };

  const existing = DB.leaves.filter(l=>l.employeeId===employeeId && l.status!=='rejected');

  // Overlap check — no duplicate/overlapping requests
  for(const l of existing){
    const lf = new Date(l.from+'T00:00:00'), lt = new Date(l.to+'T00:00:00');
    if(start <= lt && end >= lf){
      return { ok:false, msg:`These dates overlap your existing ${l.status} ${l.type} (${fmtDate(l.from)} – ${fmtDate(l.to)}).` };
    }
  }

  // Rule 1 — the request on its own
  if(days > 2 && noticeDays < 7){
    return { ok:false, msg:`Leaves longer than 2 days must be applied at least 7 days in advance. You're giving ${Math.max(noticeDays,0)} day(s) notice for a ${days}-day leave.` };
  }

  // Rule 2 — merge with touching leaves into one combined stretch (chained)
  let blockFrom = start.getTime(), blockTo = end.getTime();
  const used = new Set();
  let expanded = true;
  while(expanded){
    expanded = false;
    for(const l of existing){
      if(used.has(l.id)) continue;
      const lf = new Date(l.from+'T00:00:00').getTime();
      const lt = new Date(l.to+'T00:00:00').getTime();
      // touching = adjacent (next/previous calendar day) or overlapping
      if(lf <= blockTo + dayMs && lt >= blockFrom - dayMs){
        blockFrom = Math.min(blockFrom, lf);
        blockTo = Math.max(blockTo, lt);
        used.add(l.id);
        expanded = true;
      }
    }
  }
  const blockDays = Math.round((blockTo - blockFrom)/dayMs) + 1;
  if(blockDays > 2){
    const noticeForBlock = Math.round((blockFrom - today.getTime())/dayMs);
    if(noticeForBlock < 7){
      return { ok:false, msg:`Combined with your existing leave(s), this makes a ${blockDays}-day continuous stretch starting ${fmtDate(new Date(blockFrom).toISOString().slice(0,10))}. Stretches longer than 2 days need 7 days' advance notice — this request can't slip past that by splitting it up.` };
    }
  }

  return { ok:true, days };
}

function decideLeave(leaveId, decision){
  const l = DB.leaves.find(x=>x.id===leaveId);
  if(!l || l.status!=='pending') return;
  const emp = getEmp(l.employeeId);
  if(decision === 'approved'){
    if(l.type === 'Comp-off'){
      const credits = availableCompOffs(emp.id).slice(0, l.days);
      credits.forEach(c=>{ c.status='used'; c.usedFor=l.id; });
    } else if(l.type === 'Earned Leave'){
      emp.leaveBalance.earned = Math.max(0, +(emp.leaveBalance.earned - l.days).toFixed(1));
    } else {
      emp.leaveBalance.csl = Math.max(0, +(emp.leaveBalance.csl - l.days).toFixed(1));
    }
  }
  l.status = decision;
  toast(`${l.type} for ${emp.name} ${decision}.`);
  render();
}

/* ---------- Admin accrual / adjustment actions ---------- */
function runMonthlyAccrual(){
  DB.employees.filter(e=>e.status==='active').forEach(e=>{
    e.leaveBalance.earned = +(e.leaveBalance.earned + 1.5).toFixed(1);
  });
  toast('Monthly accrual done — +1.5 Earned Leave credited to every active employee.');
  render();
}
function runQuarterlyCsl(){
  DB.employees.filter(e=>e.status==='active').forEach(e=>{
    e.leaveBalance.csl = +(e.leaveBalance.csl + 2).toFixed(1);
  });
  toast('Quarterly credit done — +2 CSL credited to every active employee.');
  render();
}
function runYearEndCarry(){
  if(!confirm('Year-end carry forward: Earned Leave will be capped at 10 for everyone, CSL resets to 0 (fresh accruals start with the new year), and expired comp-offs lapse. Continue?')) return;
  DB.employees.filter(e=>e.status==='active').forEach(e=>{
    e.leaveBalance.earned = Math.min(e.leaveBalance.earned, 10);
    e.leaveBalance.csl = 0;
  });
  lapseExpiredCompOffs();
  toast('Year-end carry forward complete — max 10 EL carried, rest lapsed, CSL reset.');
  render();
}

  if(m.type === 'newSurvey'){

  if(m.type === 'newTicket'){

      <div class="row-2">
        <div class="field"><label>Account number</label><input id="f-edit-bank-acc" value="${escapeHtml(bank.accountNo||'')}" placeholder="XXXXXXXXXXXX"></div>
        <div class="field"><label>IFSC</label><input id="f-edit-bank-ifsc" value="${escapeHtml(bank.ifsc||'')}" placeholder="HDFC0001234"></div>
      </div>
      <div class="divider"></div>
      <div class="section-title">Access & reporting (admin only)</div>
      <div class="field"><label>Admin access <span style="color:var(--ink-soft);font-weight:400;">(currently ${adminCount()}/${MAX_ADMINS} admins)</span></label>

  if(m.type === 'reviewRegularization'){

  if(m.type === 'newAsset'){

function submitLeave(){
  const type = $('#f-leave-type').value.startsWith('Comp-off') ? 'Comp-off' : $('#f-leave-type').value;
  const from = $('#f-leave-from').value;
  const to = $('#f-leave-to').value;
  const reason = $('#f-leave-reason').value;
  if(!from || !to){ toast('Please select both dates.'); return; }
  if(to < from){ toast('"To" date cannot be before "From" date.'); return; }

  const check = validateLeaveRequest(state.currentUserId, from, to);
  if(!check.ok){ toast(check.msg); return; }
  const days = check.days;

  // Balance / credit checks
  const me = currentUser();
  if(type === 'Comp-off'){
    const avail = availableCompOffs(me.id).length;
    if(days > avail){ toast(`You have ${avail} comp-off(s) available — can't apply for ${days} day(s).`); return; }
  } else if(type === 'Earned Leave'){
    if(days > me.leaveBalance.earned){ toast(`Not enough Earned Leave — you have ${me.leaveBalance.earned}, this needs ${days}.`); return; }
  } else {
    if(days > me.leaveBalance.csl){ toast(`Not enough CSL — you have ${me.leaveBalance.csl}, this needs ${days}.`); return; }
  }

  DB.leaves.push({ id:uid('l'), employeeId: state.currentUserId, type, from, to, days, reason: reason||'—', status:'pending', appliedOn: todayIso() });
  toast('Leave request submitted for approval.');
  closeModal();
}

/* ---------------------------- Edit / add employee (with salary, bank, admin) ---------------------------- */
async function submitEditEmployee(id){
  const emp = getEmp(id);
  const viewer = currentUser();
  const admin = isAdminUser(viewer);
  const patch = {
    name: $('#f-edit-name').value.trim(),
    role: $('#f-edit-role').value.trim(),
    dept: $('#f-edit-dept').value.trim(),
    location: $('#f-edit-location').value.trim(),
    mobile: $('#f-edit-mobile').value.trim(),
    email: $('#f-edit-email').value.trim(),
    birthday: $('#f-edit-birthday').value || null,
  };

  let newIsAdmin = emp.isAdmin;
  let newSalary = emp.salary, newBank = emp.bank, newManagerId = emp.managerId;
  if(admin){
    // Salary
    const b = parseFloat($('#f-edit-sal-basic').value);
    const h = parseFloat($('#f-edit-sal-hra').value);
    const s = parseFloat($('#f-edit-sal-special').value);
    if(!isNaN(b) && b > 0){
      newSalary = { basic: b, hra: isNaN(h)?0:h, special: isNaN(s)?0:s };
    } else if($('#f-edit-sal-basic').value === '' && $('#f-edit-sal-hra').value === '' && $('#f-edit-sal-special').value === ''){
      newSalary = null;
    }
    // Bank
    const bankName = $('#f-edit-bank-name').value.trim();
    const holder = $('#f-edit-bank-holder').value.trim();
    const accountNo = $('#f-edit-bank-acc').value.trim();
    const ifsc = $('#f-edit-bank-ifsc').value.trim().toUpperCase();
    newBank = (bankName || accountNo || ifsc || holder) ? { bankName, holder, accountNo, ifsc } : null;
    // Admin access — max 2, never zero
    const wantAdmin = $('#f-edit-isadmin').value === 'yes';
    if(wantAdmin && !emp.isAdmin && adminCount() >= MAX_ADMINS){
      toast(`Only ${MAX_ADMINS} admins allowed at a time — remove admin access from someone first.`);
      return;
    }
    if(!wantAdmin && emp.isAdmin && adminCount() <= 1){
      toast('Cannot remove the last remaining admin — grant admin to someone else first.');
      return;
    }
    newIsAdmin = wantAdmin;
    const managerSelect = document.getElementById('f-edit-manager');
    if(managerSelect) newManagerId = managerSelect.value || null;
  }

  if(USE_SUPABASE){
    // Step 1: core fields (these columns definitely exist)
    const { error } = await Employees.update(id, {
      name: patch.name, role: patch.role, dept: patch.dept, location: patch.location,
      mobile: patch.mobile, email: patch.email,
      ...(admin ? { manager_id: newManagerId } : {}),
    });
    if(error){ toast('Could not save: ' + error.message); return; }
    // Step 2: v2.3 fields — may fail until the SQL migration is run; degrade gracefully
    const extended = { birthday: patch.birthday };
    if(admin){ extended.salary = newSalary; extended.bank = newBank; extended.is_admin = newIsAdmin; }
    const ext = await Employees.update(id, extended);
    const rows = await Employees.list('name');
    DB.employees = rows.map(mapEmployeeFromRow);
    // Keep local values even if the live columns don't exist yet
    const fresh = getEmp(id);
    if(fresh){
      fresh.birthday = patch.birthday;
      if(admin){ fresh.salary = newSalary; fresh.bank = newBank; fresh.isAdmin = newIsAdmin; fresh.managerId = newManagerId; }
    }
    if(ext.error){
      toast('Saved. Note: salary/bank/birthday/admin are kept locally for now — run the v2.3 SQL migration to store them in the live database.');
    } else {
      toast('Details updated.');
    }
    closeModal();
    render();
    return;
  }

  // Demo fallback
  Object.assign(emp, patch);
  if(admin){ emp.salary = newSalary; emp.bank = newBank; emp.isAdmin = newIsAdmin; emp.managerId = newManagerId; }
  toast('Details updated (demo mode — not saved permanently).');
  closeModal();
}

/* ---------------------------- Regularization (time-wise, v2.3) ---------------------------- */
async function submitRegularization(isBulk){
  const reason = $('#f-reg-reason').value.trim();
  const requestedIn = $('#f-reg-in').value || null;
  const requestedOut = $('#f-reg-out').value || null;
  if(!reason){ toast('Please add a reason.'); return; }
  if(!requestedIn && !isBulk){ toast('Please enter the correct punch-in time.'); return; }
  let dates = [];
  if(isBulk){
    const from = $('#f-bulkreg-from').value, to = $('#f-bulkreg-to').value;
    if(!from || !to){ toast('Please select a date range.'); return; }
    let d = new Date(from);
    const end = new Date(to);
    while(d <= end){ dates.push(d.toISOString().slice(0,10)); d.setDate(d.getDate()+1); }
  } else {
    const date = $('#f-reg-date').value;
    if(!date){ toast('Please select a date.'); return; }
    dates = [date];
  }
  const appliedOn = todayIso();
  const base = { employee_id: state.currentUserId, dates, reason, status:'pending', applied_on: appliedOn };

  if(USE_SUPABASE){
    // Try with times first; if the columns don't exist yet, retry without them
    let { data, error } = await Regularizations.insert({ ...base, requested_in: requestedIn, requested_out: requestedOut });
    let timesLocalOnly = false;
    if(error){
      const retry = await Regularizations.insert(base);
      if(retry.error){ toast('Could not submit: ' + retry.error.message); return; }
      timesLocalOnly = true;
    }
    const regRows = await Regularizations.list();
    DB.regularizations = regRows.map(mapRegularizationFromRow);
    // Keep the requested times on the newest local record even if the live columns are missing
    if(timesLocalOnly){
      const mine = DB.regularizations.filter(r=>r.employeeId===state.currentUserId && r.appliedOn===appliedOn);
      if(mine.length){ const last = mine[mine.length-1]; last.requestedIn = requestedIn; last.requestedOut = requestedOut; }
    }
    toast(`Regularization submitted for ${dates.length} day(s)${requestedIn ? ` (in ${requestedIn}${requestedOut?`, out ${requestedOut}`:''})` : ''}.`);
    closeModal();
    return;
  }

  DB.regularizations.push({ id:uid('rg'), employeeId: state.currentUserId, dates, reason, requestedIn, requestedOut, status:'pending', appliedOn });
  toast(`Regularization submitted for ${dates.length} day(s).`);
  closeModal();
}

async function approveRegularization(id){
  const r = DB.regularizations.find(x=>x.id===id);
  if(!r) return;
  const finalIn = $('#f-rev-in').value;
  const finalOut = $('#f-rev-out').value || null;
  if(!finalIn){ toast('Punch-in time is required to approve.'); return; }
  const status = finalIn > '09:15' ? 'late' : 'present';

  for(const date of r.dates){
    let att = DB.attendance.find(a=>a.employeeId===r.employeeId && a.date===date);
    if(att){
      att.checkIn = finalIn;
      if(finalOut) att.checkOut = finalOut;
      att.status = status;
      att.source = 'Regularized';
      if(USE_SUPABASE && att.id && String(att.id).length > 8){
        try{ await Attendance.update(att.id, { check_in: finalIn, check_out: finalOut, status, source: 'Regularized' }); }catch(e){}
      }
    } else {
      if(USE_SUPABASE){
        const { data } = await Attendance.insert({ employee_id: r.employeeId, date, check_in: finalIn, check_out: finalOut, status, source: 'Regularized' });
        if(data) DB.attendance.push(mapAttendanceFromRow(data));
        else DB.attendance.push({ id:uid('at'), employeeId:r.employeeId, date, checkIn:finalIn, checkOut:finalOut||'—', status, source:'Regularized' });
      } else {
        DB.attendance.push({ id:uid('at'), employeeId:r.employeeId, date, checkIn:finalIn, checkOut:finalOut||'—', status, source:'Regularized' });
      }
    }
  }

  if(USE_SUPABASE){ try{ await Regularizations.update(r.id, { status:'approved' }); }catch(e){} }
  r.status = 'approved';
  const emp = getEmp(r.employeeId);
  toast(`Regularization approved — ${emp.name}'s attendance set to in ${finalIn}${finalOut?`, out ${finalOut}`:''} for ${r.dates.length} day(s).`);
  closeModal();
  render();
}

async function rejectRegularization(id){
  const r = DB.regularizations.find(x=>x.id===id);
  if(!r) return;
  if(USE_SUPABASE){ try{ await Regularizations.update(id, { status:'rejected' }); }catch(e){} }
  r.status = 'rejected';

function parseCsv(text){
  const lines = text.split(/\r?\n/).filter(l=>l.trim().length>0);
  if(lines.length<2) return [];
  const headers = lines[0].split(',').map(h=>h.trim());
  return lines.slice(1).map(line=>{
    const cells = line.split(',').map(c=>c.trim());
    const row = {};
    headers.forEach((h,i)=> row[h] = cells[i] || '');
    return row;
  });
}

  const fileInput = $('#f-bulk-file');
  if(!fileInput.files || fileInput.files.length===0){ toast('Please choose a CSV file.'); return; }
  const file = fileInput.files[0];
  const reader = new FileReader();
  reader.onload = (e)=>{
    const rows = parseCsv(e.target.result);
    if(rows.length===0){ toast('No rows found in that CSV.'); return; }
    let added = 0;
    rows.forEach(row=>{
      if(!row.name) return;
      DB.employees.push({
        id: uid('e'),
        name: row.name,
        role: row.role || 'Employee',
        dept: row.dept || 'General',
        location: row.location || 'Panvel Hub',
        managerId: row.managerId || null,
        email: row.email || '',
        mobile: row.mobile || '',
        userRole: 'employee',
        isAdmin: false,
        workMode: row.workMode === 'field' ? 'field' : 'office',
        status: 'active',
        birthday: row.birthday || null,
        salary: null,
        bank: null,
        password: null,
        passwordSet: false,
        joinDate: todayIso(),
        leaveBalance: { csl: 2, earned: 0 },
      });
      added++;
    });
    toast(`${added} employee(s) added — they'll set their password on first sign-in. Set their salaries from each profile before running payroll.`);
    closeModal();
  };
  reader.readAsText(file);
}

async function submitNewEmployee(){
  const name = $('#f-newemp-name').value.trim();
  const role = $('#f-newemp-role').value.trim();
  const dept = $('#f-newemp-dept').value.trim();
  const location = $('#f-newemp-location').value.trim();
  const managerId = $('#f-newemp-manager').value || null;
  const email = $('#f-newemp-email').value.trim();
  const mobile = $('#f-newemp-mobile').value.trim();
  const workMode = $('#f-newemp-workmode').value;
  const birthday = $('#f-newemp-birthday').value || null;
  if(!name || !email || !mobile){ toast('Name, email, and mobile are required.'); return; }

  // Optional salary & bank
  const b = parseFloat($('#f-newemp-sal-basic').value);
  const h = parseFloat($('#f-newemp-sal-hra').value);
  const s = parseFloat($('#f-newemp-sal-special').value);
  const salary = (!isNaN(b) && b > 0) ? { basic: b, hra: isNaN(h)?0:h, special: isNaN(s)?0:s } : null;
  const bankName = $('#f-newemp-bank-name').value.trim();
  const holder = $('#f-newemp-bank-holder').value.trim();
  const accountNo = $('#f-newemp-bank-acc').value.trim();
  const ifsc = $('#f-newemp-bank-ifsc').value.trim().toUpperCase();
  const bank = (bankName || accountNo || ifsc || holder) ? { bankName, holder, accountNo, ifsc } : null;

  if(USE_SUPABASE){
    const { data, error } = await Employees.insert({
      user_id: null, name, role: role||'Employee', dept: dept||'General',
      location: location||'Panvel Hub', manager_id: managerId, email, mobile,
      user_role: 'employee', work_mode: workMode||'office', status:'active',
    });
    if(error){ toast('Could not add employee: ' + error.message); return; }
    // v2.3 fields — best effort until migration is run
    let extWarn = false;
    if(data && data.id){
      const ext = await Employees.update(data.id, { birthday, salary, bank, is_admin: false });
      if(ext.error) extWarn = true;
    }
    const rows = await Employees.list('name');
    DB.employees = rows.map(mapEmployeeFromRow);
    if(data && data.id){
      const fresh = getEmp(data.id);
      if(fresh){ fresh.birthday = birthday; fresh.salary = salary; fresh.bank = bank; }
    }
    toast(`${name} added. Tell them: app → "First time here? Set your password" with ${email} or ${mobile}.${extWarn ? ' (Salary/bank/birthday kept locally — run the v2.3 SQL migration to store them live.)' : ''}`);
    closeModal();
    return;
  }

  // Demo fallback
  if(findEmployeeByIdentifier(email) || findEmployeeByIdentifier(mobile)){ toast('An employee with that email or mobile already exists.'); return; }
  DB.employees.push({
    id: uid('e'), name, role: role||'Employee', dept: dept||'General', location: location||'Panvel Hub',
    managerId, email, mobile, userRole:'employee', isAdmin:false, workMode: workMode||'office', status:'active',
    birthday, salary, bank,
    password: null, passwordSet: false, joinDate: todayIso(),
    leaveBalance: { csl: 2, earned: 0 },
  });
  toast(`${name} added — they'll set their password on first sign-in.`);
  closeModal();
}

/* ---------------------------- Boot ---------------------------- */
let _isPasswordRecovery = false;

async function boot(){
  // Watchdog: whatever happens (hung network call, unexpected error), NEVER
  // leave a blank screen — if nothing has rendered in 5s, show the login.
  const watchdog = setTimeout(() => {
    const app = document.getElementById('app');
    if(app && app.innerHTML.trim() === '' && !state.isAuthenticated){
      render();
      toast('Took too long to reach the live database — showing sign-in. Check your connection and try signing in.');
    }
  }, 5000);
  try {
    lapseExpiredCompOffs();
    if(USE_SUPABASE){
      GwplAuth.onAuthStateChange((session) => {
        // no-op here; recovery detection below handles the initial load
      });
      if(window.location.search.includes('mode=reset') || window.location.hash.includes('type=recovery')){
        const session = await GwplAuth.getCurrentSession();
        if(session){ _isPasswordRecovery = true; clearTimeout(watchdog); render(); return; }
      }
      const session = await GwplAuth.getCurrentSession();
      if(session){ await loadLiveEmployeesAndEnter(session.user.id); clearTimeout(watchdog); return; }
    }
  } catch(e){
    console.error('Boot error:', e);
    if(window.__gwplPaintError) window.__gwplPaintError('Boot: ' + (e.message || e));
  }
  clearTimeout(watchdog);
  render();
}
// Boot only after ALL script blocks have loaded (renderAuthScreen etc. live in
// a later block — calling boot synchronously in demo mode crashed before this).
if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}

/* ---------------------------- Attendance calendar (month view) ---------------------------- */
function calShiftMonth(delta){
  const base = state.calMonth ? new Date(state.calMonth + 'T00:00:00') : new Date();
  base.setDate(1);
  base.setMonth(base.getMonth() + delta);
  state.calMonth = base.toISOString().slice(0,10);
  render();
}

function renderAttendanceCalendarCard(user){
  const base = state.calMonth ? new Date(state.calMonth + 'T00:00:00') : new Date();
  const y = base.getFullYear(), m = base.getMonth();
  const monthLabel = base.toLocaleDateString('en-IN', { month:'long', year:'numeric' });
  const startDow = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const pad = n => String(n).padStart(2,'0');
  const todayStr = todayIso();

  const attByDate = {};
  DB.attendance.filter(a=>a.employeeId===user.id).forEach(a=>{ attByDate[a.date] = a.status; });
  const holidayByDate = {};
  DB.holidays.forEach(h=>{ holidayByDate[h.date] = h.name; });

  let cells = '';
  for(let i=0;i<startDow;i++) cells += `<div class="cal-cell cal-empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = `${y}-${pad(m+1)}-${pad(d)}`;
    const status = attByDate[dateStr];
    const holidayName = holidayByDate[dateStr];
    let cls = '', sub = '', title = '';
    if(status==='present' || status==='late'){ cls='cal-present'; sub='P'; title='Present'; }
    else if(status==='half_day'){ cls='cal-half'; sub='½'; title='Half day'; }
    else if(status==='absent'){ cls='cal-absent'; sub='A'; title='Absent'; }
    else if(holidayName){ cls='cal-holiday'; sub='H'; title=holidayName; }
    cells += `<div class="cal-cell ${cls} ${dateStr===todayStr?'cal-today':''}" title="${title}"><div>${d}</div>${sub?`<div style="font-size:9.5px;line-height:1;">${sub}</div>`:''}</div>`;
  }

  return `
  <div class="card" style="margin-bottom:16px;">
    <div class="card-head">
      <h3>My attendance — ${monthLabel}</h3>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-sm btn-outline" onclick="calShiftMonth(-1)">‹ Prev</button>
        <button class="btn btn-sm btn-outline" onclick="calShiftMonth(1)">Next ›</button>
      </div>
    </div>
    <div class="cal-grid">
      ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      ${cells}
    </div>
    <div class="cal-legend">
      <span><span class="cal-dot" style="background:#1C9A6C;"></span>Present</span>
      <span><span class="cal-dot" style="background:#D08A1E;"></span>Half day</span>
      <span><span class="cal-dot" style="background:#E5484D;"></span>Absent</span>
      <span><span class="cal-dot" style="background:#7C46F1;"></span>Holiday</span>
    </div>
  </div>`;
}

function setWorkMode(empId){
  const sel = document.getElementById(`f-workmode-${empId}`);
  const emp = getEmp(empId);
  emp.workMode = sel.value;
  toast(`${emp.name} is now set to ${sel.value === 'field' ? 'Field (App + GPS)' : 'Office (ESSL Biometric)'}.`);
  render();
}

/* ---------------------------- Field Tracking (Sales site visits, GPS auto-km) ---------------------------- */
function renderFieldTracking(user){
  const managed = isAdminUser(user);
  const visits = managed ? DB.siteVisits : DB.siteVisits.filter(v=>v.employeeId===user.id);
  const isLiveMe = state.liveTracking.active && state.liveTracking.employeeId === user.id;
  const today = todayIso();
  const todaysVisit = DB.siteVisits.find(v=>v.employeeId===user.id && v.date===today);

  const visitCard = (v) => {
    const emp = getEmp(v.employeeId);
    const live = state.liveTracking.active && state.liveTracking.visitId === v.id;
    return `<div class="card">
      <div class="card-head">
        <div><h3>${fmtDate(v.date)} ${live ? `<span class="tag tag-progress" style="margin-left:6px;">${ICON.pin} Live</span>` : ''}</h3><div style="font-size:12px;color:var(--ink-soft);">${emp.name}</div></div>
        <span class="tag tag-neutral">${ICON.map} ${v.totalKm} km</span>
      </div>
      <div style="display:flex;flex-direction:column;">
        ${v.checkIns.map((c,i)=>`
          <div style="display:flex;gap:10px;align-items:flex-start;padding:8px 0;${i<v.checkIns.length-1?'border-bottom:1px dashed var(--border);':''}">
            <div style="width:22px;height:22px;border-radius:50%;background:var(--primary-tint);color:var(--primary-dark);display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;flex-shrink:0;">${i+1}</div>
            <div style="flex:1;">
              <div style="font-weight:600;font-size:13px;">${c.label}</div>
              <div style="font-size:11.5px;color:var(--ink-soft);">${c.time} · ${c.lat.toFixed(4)}, ${c.lng.toFixed(4)}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  };

  const punchArea = !managed ? `
    <div class="card" style="margin-bottom:16px;">
      ${isLiveMe ? `
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
          <div>
            <div style="display:flex;align-items:center;gap:8px;">
              <span style="width:9px;height:9px;border-radius:50%;background:var(--green);display:inline-block;animation:pulseDot 1.4s infinite;"></span>
              <b>Live — tracking since ${state.liveTracking.startedAt}</b>
            </div>
            <div style="font-size:12.5px;color:var(--ink-soft);margin-top:4px;" id="live-km-readout">${todaysVisit ? todaysVisit.totalKm : 0} km travelled so far today · ${state.liveTracking.pingCount} GPS ping(s)</div>
          </div>
          <button class="btn btn-danger-outline" onclick="endFieldDay()">${ICON.x} End my day</button>
        </div>
      ` : `
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
          <div style="font-size:13px;">${ICON.pin} Start your day to begin GPS attendance & travel tracking.</div>
          <button class="btn btn-primary" onclick="startFieldDay()">${ICON.pin} Start my day</button>
        </div>
      `}
      <div class="hint" style="margin-top:8px;">Keep this page open in your browser (or the installed app) while you're out — location updates automatically as you move.</div>
    </div>` : '';

  return `
    <div class="page-head">
      <div class="eyebrow">Field sales tracking</div>
      <h1>Field Tracking</h1>
      <p>Start your day for live GPS attendance — km travelled is calculated automatically between stops.</p>
    </div>

    ${punchArea}

    <div class="grid grid-2" style="grid-template-columns:1fr 1fr;">
      ${visits.length===0 ? `<div class="card empty-state" style="grid-column:1/-1;">${ICON.empty}<div>No site visits logged yet.</div></div>` : visits.slice().reverse().map(visitCard).join('')}
    </div>
  `;
}

function startFieldDay(){
  if(!navigator.geolocation){ toast('Geolocation not supported on this device.'); return; }
  toast('Getting your location...');
  navigator.geolocation.getCurrentPosition(
    (pos)=>{
      const { latitude, longitude } = pos.coords;
      const today = todayIso();
      const time = new Date().toTimeString().slice(0,5);

      let visit = DB.siteVisits.find(v=>v.employeeId===state.currentUserId && v.date===today);
      if(!visit){
        visit = { id:uid('sv'), employeeId: state.currentUserId, date: today, checkIns: [], totalKm: 0 };
        DB.siteVisits.push(visit);
      }
      visit.checkIns.push({ label:'Start of day (punch-in)', lat:latitude, lng:longitude, time });
      computeVisitKm(visit);

      let att = DB.attendance.find(a=>a.employeeId===state.currentUserId && a.date===today);
      if(!att){
        att = { id:uid('at'), employeeId: state.currentUserId, date: today, checkIn:'—', checkOut:'—', status:'present', source:'Field App — GPS' };
        DB.attendance.push(att);
      }
      att.checkIn = time;
      att.status = time > '09:15' ? 'late' : 'present';
      att.source = 'Field App — GPS';

      const watchId = navigator.geolocation.watchPosition(
        (p)=>{
          const v = DB.siteVisits.find(x=>x.id===state.liveTracking.visitId);
          if(!v) return;
          const last = v.checkIns[v.checkIns.length-1];
          const distFromLast = haversineKm(last.lat,last.lng,p.coords.latitude,p.coords.longitude);
          state.liveTracking.pingCount++;
          if(distFromLast > 0.1){ // only log meaningful movement, avoid GPS jitter spam
            v.checkIns.push({ label:`Live ping ${v.checkIns.length}`, lat:p.coords.latitude, lng:p.coords.longitude, time:new Date().toTimeString().slice(0,5) });
            computeVisitKm(v);
          }
          const readout = document.getElementById('live-km-readout');
          if(readout) readout.textContent = `${v.totalKm} km travelled so far today · ${state.liveTracking.pingCount} GPS ping(s)`;
        },
        (err)=>{ toast('Location watch error: ' + err.message); },
        { enableHighAccuracy:true, maximumAge:5000, timeout:15000 }
      );

      state.liveTracking = { active:true, employeeId: state.currentUserId, watchId, startedAt: time, visitId: visit.id, pingCount:0 };
      acquireWakeLock();
      toast('Day started — live tracking is on. Keep this screen open while you\'re out.');
      render();
    },
    (err)=>{ toast('Could not get location: ' + err.message); },
    { enableHighAccuracy:true, timeout:10000 }
  );
}

/* Wake Lock: stops the screen from auto-sleeping while tracking is active, so
   watchPosition keeps firing. This only works while the tab/app is in the
   foreground — it cannot keep GPS running with the screen off or the app
   fully backgrounded; that's an OS-level restriction on both Android and
   especially iOS, not something a web page can override. */
let _wakeLock = null;
async function acquireWakeLock(){
  try{
    if('wakeLock' in navigator){
      _wakeLock = await navigator.wakeLock.request('screen');
      _wakeLock.addEventListener('release', () => { _wakeLock = null; });
    }
  } catch(err){ console.warn('Wake Lock not available:', err.message); }
}
function releaseWakeLock(){
  if(_wakeLock){ _wakeLock.release().catch(()=>{}); _wakeLock = null; }
}
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'visible' && state.liveTracking.active && !_wakeLock){
    acquireWakeLock();
  }
});

function endFieldDay(){
  if(state.liveTracking.watchId !== null && navigator.geolocation){
    navigator.geolocation.clearWatch(state.liveTracking.watchId);
  }
  releaseWakeLock();
  const today = todayIso();
  const time = new Date().toTimeString().slice(0,5);
  const att = DB.attendance.find(a=>a.employeeId===state.currentUserId && a.date===today);
  if(att) att.checkOut = time;
  const visit = DB.siteVisits.find(v=>v.id===state.liveTracking.visitId);
  if(visit){
    visit.checkIns.push({ label:'End of day (punch-out)', lat:visit.checkIns[visit.checkIns.length-1].lat, lng:visit.checkIns[visit.checkIns.length-1].lng, time });
  }
  toast(`Day ended — ${visit ? visit.totalKm : 0} km travelled today.`);
  state.liveTracking = { active:false, employeeId:null, watchId:null, startedAt:null, visitId:null, pingCount:0 };
  render();
}

/* ---------------------------- Payslips (v2.3: generated by admin, from real salary) ---------------------------- */
function currentMonthLabel(){
  return new Date().toLocaleDateString('en-IN',{ month:'long', year:'numeric' });
}

function computePayslip(emp, monthLabel){
  if(!emp.salary || !emp.salary.basic) return null;
  return computeStatutoryPayslip(emp, emp.salary, monthLabel);
}

function generatePayslips(){
  const month = ($('#f-payroll-month').value || '').trim() || currentMonthLabel();
  let created = 0, noSalary = [], existed = 0;
  DB.employees.filter(e=>e.status==='active').forEach(e=>{
    if(!e.salary || !e.salary.basic){ noSalary.push(e.name); return; }
    if(DB.payslips.some(p=>p.employeeId===e.id && p.month===month)){ existed++; return; }
    DB.payslips.push({
      id: uid('ps'), employeeId: e.id, month,
      generatedOn: todayIso(),
      slip: computeStatutoryPayslip(e, e.salary, month),
    });
    created++;
  });
  let msg = `Payslips for ${month}: ${created} generated`;
  if(existed) msg += `, ${existed} already existed`;
  if(noSalary.length) msg += `. Skipped (no salary set): ${noSalary.slice(0,3).join(', ')}${noSalary.length>3?` +${noSalary.length-3} more`:''}`;
  toast(msg + '.');
  render();
}

function goForgotPassword(){ state.authFlow = { mode:'forgot', employeeId:null, demoCode:null }; render(); }
function backToSignin(){ state.authFlow = { mode:'signin', employeeId:null, demoCode:null }; render(); }
function goFirstTimeSetup(){ state.authFlow = { mode:'firstTimeLookup' }; render(); }

async function submitFirstTimeLookup(){
  const identifier = $('#f-ft-id').value.trim();
  if(!identifier){ toast('Enter your registered email or mobile.'); return; }

  if(USE_SUPABASE){
    const { data: email, error } = await sb.rpc('resolve_signup_email', { identifier });
    if(error || !email){
      const { data: existing } = await sb.rpc('resolve_login_email', { identifier });
      if(existing){ toast('You already have an account — sign in instead, or use Forgot password.'); backToSignin(); return; }
      toast('This email/mobile is not registered. Contact HR/Admin.');
      return;
    }
    state.authFlow = { mode:'firstTimeSet', signupEmail: email };
    render();
    return;
  }

  // Demo fallback
  const emp = findEmployeeByIdentifier(identifier);
  if(!emp){ toast('This email/mobile is not registered. Contact HR/Admin.'); return; }
  state.authFlow = { mode:'setup', employeeId: emp.id };
  render();
}

async function submitFirstTimeCreate(){
  const p1 = $('#f-ft-pass').value;
  const p2 = $('#f-ft-pass2').value;
  if(!p1 || p1.length < 6){ toast('Password must be at least 6 characters.'); return; }
  if(p1 !== p2){ toast('Passwords do not match.'); return; }
  toast('Creating your account...');
  const { data, error } = await sb.auth.signUp({ email: state.authFlow.signupEmail, password: p1 });
  if(error){ toast(error.message); return; }
  if(data && data.session){
    await loadLiveEmployeesAndEnter(data.user.id);
  } else {
    toast('Account created — sign in with your new password.');
    backToSignin();
  }
}

async function submitLogin(){
  const identifier = $('#f-login-id').value.trim();
  const password = $('#f-login-password').value;

  if(USE_SUPABASE){
    if(!identifier || !password){ toast('Enter your email/mobile and password.'); return; }
    toast('Signing in...');
    const { data, error } = await GwplAuth.signIn(identifier, password);
    if(error){
      const raw = error.message || '';
      if(/confirm/i.test(raw)){
        toast('Your account email is not confirmed yet — ask your admin to run the fix, then try again.');
      } else if(/invalid/i.test(raw)){
        toast('Password did not match. If this is your first time here, tap "First time here? Set your password" below.');
      } else {
        toast(raw || 'Sign-in failed.');
      }
      return;
    }
    await loadLiveEmployeesAndEnter(data.user.id);
    return;
  }

  // Demo fallback (no live database connected)
  const emp = findEmployeeByIdentifier(identifier);
  if(!emp){ toast('This email or mobile is not registered. Contact HR/Admin.'); return; }
  if(emp.status !== 'active'){ toast('This account is no longer active. Contact HR.'); return; }
  if(!emp.passwordSet){ state.authFlow = { mode:'setup', employeeId: emp.id }; render(); return; }
  if(emp.password !== password){ toast('Incorrect password.'); return; }
  state.currentUserId = emp.id;
  state.isAuthenticated = true;
  state.route = 'dashboard';
  state.authFlow = { mode:'signin', employeeId:null, demoCode:null };
  render();
}

/** After a successful Supabase sign-in, load the employee directory from the
    live database and find the record linked to this auth user. */
async function loadLiveEmployeesAndEnter(authUserId){
  try{
  let rows = await Employees.list('name');
  DB.employees = rows.map(mapEmployeeFromRow);
  let emp = DB.employees.find(e => e.userId === authUserId);

  if(!emp){
    try { await sb.rpc('link_my_employee_record'); } catch(e){}
    rows = await Employees.list('name');
    DB.employees = rows.map(mapEmployeeFromRow);
    emp = DB.employees.find(e => e.userId === authUserId);
  }

  if(!emp){
    toast('Signed in, but no employee record matches this login. Ask HR to add you with this exact email.');
    await GwplAuth.signOut();
    return;
  }

  // Load live attendance, regularizations, and holidays (calendar + approvals).
  try {
    const [attRows, regRows, holRows] = await Promise.all([
      Attendance.list('date'), Regularizations.list(), Holidays.list('date'),
    ]);
    DB.attendance = attRows.map(mapAttendanceFromRow);
    DB.regularizations = regRows.map(mapRegularizationFromRow);
    if(holRows.length > 0) DB.holidays = holRows.map(mapHolidayFromRow);
  } catch(e){ console.warn('Live data load issue:', e); }

  // Safety net: if no one has admin yet (e.g. is_admin column not migrated),
  // treat the original director account as admin so the org is never locked out.
  if(adminCount() === 0){
    const director = DB.employees.find(e=>e.userRole==='director') || DB.employees[0];
    if(director) director.isAdmin = true;
  }

  lapseExpiredCompOffs();
  state.currentUserId = emp.id;
  state.isAuthenticated = true;
  state.route = 'dashboard';
  render();
  }catch(e){
    console.error('Live load error:', e);
    if(window.__gwplPaintError) window.__gwplPaintError('Live data load: ' + (e.message || e));
    state.isAuthenticated = false;
    render();
    toast('Could not load live data: ' + (e.message || e));
  }
}

function submitForgotRequest(){
  const identifier = $('#f-forgot-id').value;

  if(USE_SUPABASE){
    GwplAuth.requestPasswordReset(identifier).then(({error}) => {
      if(error){ toast(error.message || 'No account found with that email/mobile.'); return; }
      toast('If that email/mobile is registered, a reset link has been sent — check your inbox.');
      backToSignin();
    });
    return;
  }

  // Demo fallback
  const emp = findEmployeeByIdentifier(identifier);
  if(!emp){ toast('No account found with that email/mobile.'); return; }
  const code = String(Math.floor(100000 + Math.random()*900000));
  state.authFlow = { mode:'reset', employeeId: emp.id, demoCode: code };
  render();
}

function submitPasswordReset(){
  const code = $('#f-reset-code').value.trim();
  const newPass = $('#f-reset-password').value;
  const confirmPass = $('#f-reset-password2').value;
  if(code !== state.authFlow.demoCode){ toast('Incorrect reset code.'); return; }
  if(!newPass || newPass.length < 6){ toast('Password must be at least 6 characters.'); return; }
  if(newPass !== confirmPass){ toast('Passwords do not match.'); return; }
  const emp = getEmp(state.authFlow.employeeId);
  emp.password = newPass;
  emp.passwordSet = true;
  toast('Password updated — you can sign in now.');
  state.authFlow = { mode:'signin', employeeId:null, demoCode:null };
  render();
}

/** Real-mode equivalent of the reset screen: shown when the person arrives via
    the emailed reset link (Supabase puts them in an active "recovery" session). */
function renderLivePasswordUpdateScreen(){
  return authShell(`
    <div class="auth-title">Set a new password</div>
    <div class="auth-sub">You're resetting your password via the emailed link.</div>
    <div class="field"><label>New password</label><input type="password" id="f-live-reset-password" placeholder="At least 6 characters"></div>
    <div class="field"><label>Confirm password</label><input type="password" id="f-live-reset-password2" placeholder="Re-enter password"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="submitLivePasswordUpdate()">Update password</button>
  `);
}
async function submitLivePasswordUpdate(){
  const newPass = $('#f-live-reset-password').value;
  const confirmPass = $('#f-live-reset-password2').value;
  if(!newPass || newPass.length < 6){ toast('Password must be at least 6 characters.'); return; }
  if(newPass !== confirmPass){ toast('Passwords do not match.'); return; }
  const { error } = await GwplAuth.updatePassword(newPass);
  if(error){ toast(error.message); return; }
  toast('Password updated! Signing you in...');
  _isPasswordRecovery = false;
  const session = await GwplAuth.getCurrentSession();
  if(session) await loadLiveEmployeesAndEnter(session.user.id);
}

function submitFirstTimeSetup(){
  const newPass = $('#f-setup-password').value;
  const confirmPass = $('#f-setup-password2').value;
  if(!newPass || newPass.length < 6){ toast('Password must be at least 6 characters.'); return; }
  if(newPass !== confirmPass){ toast('Passwords do not match.'); return; }
  const emp = getEmp(state.authFlow.employeeId);
  emp.password = newPass;
  emp.passwordSet = true;
  state.currentUserId = emp.id;
  state.isAuthenticated = true;
  state.route = 'dashboard';
  state.authFlow = { mode:'signin', employeeId:null, demoCode:null };
  toast(`Welcome, ${emp.name.split(' ')[0]}!`);
  render();
}

async function logout(){
  if(USE_SUPABASE) await GwplAuth.signOut();
  state.isAuthenticated = false;
  state.currentUserId = null;
  state.route = 'login';
  state.authFlow = { mode:'signin', employeeId:null, demoCode:null };
  render();
}

/* ---------------------------- Separations (admin page; employees resign from their profile) ---------------------------- */
function renderSeparations(user){
  const managed = isAdminUser(user);
  const myRequests = DB.separations.filter(s=>s.employeeId===user.id);
  const pending = DB.separations.filter(s=>s.status==='pending');
  const history = DB.separations.filter(s=>s.status!=='pending');

  const tagFor = s => s==='pending'?'tag-pending':s==='approved'?'tag-rejected':'tag-neutral';

  return `
    <div class="page-head">
      <div class="eyebrow">Employee lifecycle</div>
      <h1>Separations</h1>
      <p>Resignations, exits, and terminations — with letters generated once finalized. (Employees submit resignations from their own profile.)</p>
    </div>

    ${!managed ? `
      <div class="card" style="margin-bottom:16px;">
        ${user.status !== 'active' ? `<div class="tag tag-rejected" style="padding:8px 14px;">You are marked as ${user.status}.</div>` :
          myRequests.some(r=>r.status==='pending') ? `<div class="tag tag-pending" style="padding:8px 14px;">Your resignation request is pending approval.</div>` :
          `<button class="btn btn-outline" onclick="openModal('newResignation',{})">${ICON.exit} Submit resignation</button>`}
      </div>
      ${myRequests.length>0 ? `<div class="card"><div class="card-head"><h3>Your requests</h3></div>
        ${myRequests.map(r=>`<div class="list-item"><div style="flex:1;"><div style="font-weight:600;font-size:13px;">Last working day: ${fmtDate(r.lastWorkingDay)}</div><div style="font-size:12px;color:var(--ink-soft);">${escapeHtml(r.reason)}</div></div><span class="tag ${tagFor(r.status)}">${r.status}</span></div>`).join('')}
      </div>` : ''}
    ` : `
      <div style="margin-bottom:16px;"><button class="btn btn-outline" onclick="openModal('newTermination',{})">${ICON.exit} Initiate exit / termination</button></div>
      <div class="grid grid-2">
        <div class="card">
          <div class="card-head"><h3>Pending resignations</h3><span class="tag tag-pending">${pending.length}</span></div>
          ${pending.length===0 ? `<div class="empty-state">${ICON.empty}<div>Nothing pending.</div></div>` :
          pending.map(s=>{
            const emp = getEmp(s.employeeId);
            return `<div class="list-item">
              <div class="avatar md">${initials(emp.name)}</div>
              <div style="flex:1;">
                <div style="font-weight:600;">${emp.name}</div>
                <div style="font-size:12px;color:var(--ink-soft);">Last working day: ${fmtDate(s.lastWorkingDay)} · ${escapeHtml(s.reason)}</div>
              </div>
              <button class="btn btn-sm btn-green-outline" onclick="decideSeparation('${s.id}','approved')">${ICON.check}</button>
              <button class="btn btn-sm btn-danger-outline" onclick="decideSeparation('${s.id}','rejected')">${ICON.x}</button>
            </div>`;
          }).join('')}
        </div>
        <div class="card">
          <div class="card-head"><h3>Separation history</h3></div>
          ${history.length===0 ? `<div class="empty-state">${ICON.empty}<div>No completed separations yet.</div></div>` :
          history.map(s=>{
            const emp = getEmp(s.employeeId);
            return `<div class="list-item">
              <div class="avatar md">${initials(emp.name)}</div>
              <div style="flex:1;">
                <div style="font-weight:600;">${emp.name} <span style="font-weight:400;color:var(--ink-soft);">— ${s.type}</span></div>
                <div style="font-size:12px;color:var(--ink-soft);">Relieved ${fmtDate(s.lastWorkingDay)}</div>
              </div>
              <button class="btn btn-sm btn-outline" onclick="goToLetterFor('${emp.id}','relieving')">Relieving letter</button>
            </div>`;
          }).join('')}
        </div>
      </div>
    `}
  `;
}

function decideSeparation(id, decision){
  const s = DB.separations.find(x=>x.id===id);
  s.status = decision;
  if(decision==='approved'){
    const emp = getEmp(s.employeeId);
    emp.status = s.type === 'termination' ? 'terminated' : 'resigned';
    toast(`${emp.name} marked as ${emp.status}. You can generate their relieving/experience letters from the Letters page.`);
  } else {
    toast('Resignation request rejected.');
  }
  render();
}

function goToLetterFor(employeeId, type){
  state.letterForm.employeeId = employeeId;
  state.letterForm.type = type;
  go('letters');
}

/* ---------------------------- Letters ---------------------------- */
const LETTER_TYPES = {
  offer: { label:'Offer Letter', needs:['ctc','joinDate'] },
  appointment: { label:'Appointment Letter', needs:['ctc','joinDate'] },
  confirmation: { label:'Confirmation Letter', needs:['confirmDate'] },
  promotion: { label:'Promotion Letter', needs:['newDesignation','newCtc','effectiveDate'] },
  experience: { label:'Experience Certificate', needs:['lastWorkingDay'] },
  relieving: { label:'Relieving Letter', needs:['lastWorkingDay'] },
};

function estimateCtc(emp){
  const s = (emp.salary && emp.salary.basic) ? emp.salary : (DB.payrollTemplates[emp.userRole] || DB.payrollTemplates.employee);
  return (s.basic + (s.hra||0) + (s.special||0)) * 12;
}

let LETTERHEAD = null;
try { LETTERHEAD = localStorage.getItem('gwpl_letterhead') || null; } catch(e){}

function uploadLetterhead(input){
  const f = input.files && input.files[0];
  if(!f) return;
  const r = new FileReader();
  r.onload = (e)=>{
    LETTERHEAD = e.target.result;
    try { localStorage.setItem('gwpl_letterhead', LETTERHEAD); }
    catch(err){ toast('Image too large to persist across reloads — it will be used for this session. Try a smaller/compressed image.'); }
    toast('Letterhead updated — all letters will now use it.');
    render();
  };
  r.readAsDataURL(f);
}
function removeLetterhead(){
  LETTERHEAD = null;
  try { localStorage.removeItem('gwpl_letterhead'); } catch(e){}
  toast('Reverted to the built-in header.');
  render();
}

function letterHeader(){
  const lh = LETTERHEAD || GWPL_LETTERHEAD_DEFAULT;
  if(lh){
    return `<img src="${lh}" alt="GWPL Letterhead" style="width:100%;display:block;margin-bottom:22px;">`;
  }
  return `
    <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;padding-bottom:14px;">
      <div style="display:flex;align-items:center;gap:14px;">
        <img src="${GWPL_LOGO}" alt="GWPL" style="width:64px;height:64px;object-fit:contain;flex-shrink:0;">
        <div>
          <div style="font-family:'Fraunces',Georgia,serif;font-weight:700;font-size:21px;letter-spacing:0.3px;color:#1E2749;">Geetanjali Woodcraft Pvt. Ltd.</div>
          <div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#B08A2E;font-weight:700;margin-top:3px;">Where Innovation Meets Functionality</div>
        </div>
      </div>
      <div style="text-align:right;font-size:9.5px;color:#4A4A55;line-height:1.7;">
        <b>Head Office:</b> Phase-2, Plot No. 75, Sector-23,<br>Marble Market, Kalamboli, Panvel, Maharashtra 410218<br>
        <b>Factories:</b> Panvel, Maharashtra · Kutch, Gujarat
      </div>
    </div>
    <div style="height:3px;background:#B08A2E;"></div>
    <div style="height:1.5px;background:#1E2749;margin-top:2px;margin-bottom:22px;"></div>

}
